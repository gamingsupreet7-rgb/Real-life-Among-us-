<!DOCTYPE html>
<html lang="hi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>Among Us: Tactical Ultra</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-app.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-database.js"></script>
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css" rel="stylesheet">
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Orbitron:wght@900&family=Rajdhani:wght@700&display=swap');
        :root { --neon-blue: #00f3ff; --neon-red: #ff003c; }
        
        /* FULL SCREEN FIX */
        * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
        body, html { 
            margin: 0; padding: 0; width: 100%; height: 100%; 
            background: #000; color: #fff; font-family: 'Rajdhani', sans-serif; 
            overflow: hidden; position: fixed; 
        }

        .glass { background: rgba(255, 255, 255, 0.04); backdrop-filter: blur(15px); border: 1px solid rgba(255, 255, 255, 0.1); border-radius: 20px; }
        .screen { position: absolute; inset: 0; display: none; padding: 15px; flex-direction: column; padding-top: env(safe-area-inset-top); padding-bottom: env(safe-area-inset-bottom); }
        .screen.active { display: flex; }
        
        .btn-prime { background: linear-gradient(45deg, #0041ff, #00f3ff); border-radius: 12px; font-family: 'Orbitron'; font-weight: 900; box-shadow: 0 4px 15px rgba(0, 243, 255, 0.3); }

        /* MEGA MAP UI */
        #map-view { 
            flex-grow: 1; width: 100%; background: radial-gradient(circle, #0a0a1a 0%, #000 100%); 
            border: 2px solid var(--neon-blue); border-radius: 25px; position: relative; 
            overflow: hidden; box-shadow: inset 0 0 30px rgba(0, 243, 255, 0.2); margin: 10px 0;
        }
        .p-dot { 
            width: 16px; height: 16px; border-radius: 50%; position: absolute; 
            transform: translate(-50%, -50%); border: 2px solid #fff; 
            box-shadow: 0 0 15px currentColor; 
            transition: all 0.8s cubic-bezier(0.34, 1.56, 0.64, 1); /* Ultra Smooth movement */
            z-index: 10;
        }

        .exit-btn { position: fixed; top: 10px; right: 10px; z-index: 1000; width: 35px; height: 35px; background: rgba(255,0,0,0.2); border: 1px solid rgba(255,0,0,0.5); border-radius: 8px; display: flex; align-items: center; justify-content: center; }
        #exit-confirm { position: fixed; inset: 0; background: rgba(0,0,0,0.95); z-index: 9999; display: none; align-items: center; justify-content: center; padding: 20px; }
    </style>
</head>
<body>

    <div id="exit-confirm">
        <div class="glass p-8 w-full max-w-sm text-center">
            <h2 class="text-2xl font-black text-red-500 mb-6 font-['Orbitron'] tracking-tighter">ABORT MISSION?</h2>
            <div class="flex gap-4">
                <button onclick="toggleExit(false)" class="flex-1 py-4 bg-gray-800 rounded-xl font-bold">STAY</button>
                <button onclick="location.reload()" class="flex-1 py-4 bg-red-700 rounded-xl font-bold">EXIT</button>
            </div>
        </div>
    </div>

    <button class="exit-btn" onclick="toggleExit(true)"><i class="fas fa-times text-red-500"></i></button>

    <div id="auth" class="screen active justify-center">
        <div class="text-center mb-8">
            <h1 class="text-5xl font-black italic tracking-tighter uppercase">Tactical</h1>
            <h2 class="text-2xl text-[#00f3ff] font-['Orbitron'] tracking-[0.2em]">AMONG US</h2>
        </div>
        <div class="glass p-6 space-y-4">
            <input id="p-name" type="text" placeholder="AGENT IDENTITY" class="w-full bg-black/50 p-5 rounded-xl border border-white/10 text-center font-bold uppercase outline-none focus:border-cyan-400">
            <button onclick="showScreen('mode')" class="w-full btn-prime py-5 text-xl uppercase">Initialize</button>
        </div>
    </div>

    <div id="mode" class="screen justify-center space-y-4">
        <div onclick="showScreen('host-setup')" class="glass p-8 text-center border-cyan-500/30">
            <i class="fas fa-satellite-dish text-3xl mb-3 text-cyan-400"></i>
            <h3 class="text-xl font-bold uppercase">Host Mission</h3>
        </div>
        <div class="glass p-5 flex flex-col gap-3">
            <input id="r-code" type="text" placeholder="6-DIGIT CODE" class="bg-black/50 p-4 rounded-xl text-center font-mono text-xl">
            <button onclick="joinGame()" class="w-full bg-green-600/80 py-4 rounded-xl font-bold uppercase">Join Sync</button>
        </div>
    </div>

    <div id="host-setup" class="screen">
        <h2 class="text-xl font-black text-cyan-400 mb-4 font-['Orbitron']">MISSION INTEL</h2>
        <div class="glass p-4 space-y-3">
            <input id="t-name" type="text" placeholder="TASK LOCATION" class="w-full bg-black p-3 rounded-lg border border-white/5 outline-none">
            <input type="file" id="t-file" class="hidden" accept="image/*" onchange="previewTask(this)">
            <button onclick="document.getElementById('t-file').click()" class="w-full h-24 border-2 border-dashed border-white/10 rounded-xl flex items-center justify-center overflow-hidden">
                <img id="t-prev" class="hidden w-full h-full object-cover">
                <span id="t-hint" class="text-gray-500 text-sm font-bold uppercase">Take Reference Photo</span>
            </button>
            <button onclick="addTask()" class="w-full py-3 bg-cyan-900/40 rounded-lg border border-cyan-500 font-bold">ADD TASK</button>
        </div>
        <div id="t-list" class="flex gap-2 mt-4 overflow-x-auto pb-2"></div>
        <button onclick="createLobby()" class="mt-auto btn-prime py-5 uppercase">Launch Lobby</button>
    </div>

    <div id="hud" class="screen">
        <div class="flex justify-between items-center px-1">
            <div>
                <h2 id="role-tag" class="text-2xl font-black italic tracking-tight">CREWMATE</h2>
                <p id="gps-tag" class="text-[10px] text-cyan-400 font-mono tracking-widest">GPS: SYNCING...</p>
            </div>
            <div id="task-counter" class="text-xs bg-white/10 px-3 py-1 rounded-full border border-white/10 uppercase font-bold">Task: 0/0</div>
        </div>

        <div id="map-view"><div id="map-dots"></div></div>

        <div class="glass p-1 relative overflow-hidden h-28 mb-3">
            <img id="hud-img" class="w-full h-full object-cover rounded-xl opacity-30">
            <div class="absolute inset-0 flex flex-col justify-center items-center text-center">
                <p class="text-[9px] text-cyan-400 uppercase tracking-[0.3em] mb-1">Target Area</p>
                <h3 id="hud-task" class="text-lg font-black uppercase">Locating...</h3>
            </div>
        </div>

        <div class="space-y-3 pb-2">
            <video id="v-cam" class="hidden w-full h-40 bg-black rounded-2xl object-cover border border-cyan-500 mb-2" autoplay playsinline></video>
            <div class="grid grid-cols-2 gap-3">
                <button id="task-btn" onclick="handleTask()" class="btn-prime py-8 text-lg uppercase" disabled>Do Task</button>
                <button onclick="alert('Meeting!')" class="glass bg-orange-600/10 py-8 font-black text-orange-500 border-orange-500/30 uppercase text-sm">Report</button>
            </div>
        </div>
    </div>

<script>
    const firebaseConfig = {
        apiKey: "AIzaSyDbR67XE2iBcqQUkrDjjr7LQtLUNpyUdB8",
        databaseURL: "https://rl-amongus-real-life-amo-5542a-default-rtdb.firebaseio.com",
        projectId: "rl-amongus-real-life-amo-5542a",
        appId: "1:811874974870:web:db729403e3c241c1d76b7"
    };
    firebase.initializeApp(firebaseConfig);
    const db = firebase.database();

    let state = { id: Math.random().toString(36).substr(2,9), code:'', tasks:[], cur:0, players:{}, lat:0, lon:0, origin:{la:0, lo:0} };

    function showScreen(id) {
        document.querySelectorAll('.screen').forEach(s => s.classList.remove('active'));
        document.getElementById(id).classList.add('active');
    }

    function toggleExit(s) { document.getElementById('exit-confirm').style.display = s ? 'flex' : 'none'; }

    // --- PHOTO AI: BALANCED VERSION ---
    async function getHash(src) {
        return new Promise(res => {
            const img = new Image(); img.src = src; img.onload = () => {
                const cvs = document.createElement('canvas'); const ctx = cvs.getContext('2d');
                cvs.width = 10; cvs.height = 10; ctx.drawImage(img, 0, 0, 10, 10);
                const d = ctx.getImageData(0,0,10,10).data;
                let hash = ""; for(let i=0; i<d.length; i+=4) {
                    const avg = (d[i]+d[i+1]+d[i+2])/3;
                    hash += (avg > 110 ? "1" : "0"); // Slightly more sensitive to light
                }
                res(hash);
            }
        });
    }

    function previewTask(i) {
        const r = new FileReader(); r.onload = async e => {
            document.getElementById('t-prev').src = e.target.result;
            document.getElementById('t-prev').classList.remove('hidden');
            document.getElementById('t-hint').classList.add('hidden');
            state.tempHash = await getHash(e.target.result);
        }; r.readAsDataURL(i.files[0]);
    }

    function addTask() {
        const n = document.getElementById('t-name').value;
        const i = document.getElementById('t-prev').src;
        if(!n || !state.tempHash) return;
        state.tasks.push({ name: n, img: i, hash: state.tempHash });
        document.getElementById('t-list').innerHTML += `<img src="${i}" class="w-12 h-12 object-cover rounded-lg border border-cyan-500">`;
        document.getElementById('t-name').value = ''; document.getElementById('t-prev').classList.add('hidden');
        document.getElementById('t-hint').classList.remove('hidden');
    }

    // --- GPS & SMOOTH MAP ---
    function initGPS() {
        navigator.geolocation.watchPosition(p => {
            if(state.origin.la === 0) { 
                state.origin.la = p.coords.latitude; 
                state.origin.lo = p.coords.longitude; 
            }
            
            // 1.2m Buffer to prevent jumping while sitting
            const moveDelta = getDist(state.lat || p.coords.latitude, state.lon || p.coords.longitude, p.coords.latitude, p.coords.longitude);
            if(moveDelta > 1.2 || state.lat === 0) {
                state.lat = p.coords.latitude;
                state.lon = p.coords.longitude;
            }

            const totalDist = getDist(state.origin.la, state.origin.lo, state.lat, state.lon);
            document.getElementById('gps-tag').innerText = `GPS: LOCK | MOVED: ${totalDist.toFixed(1)}M`;
            
            // Task unlocks at 5m
            if(totalDist >= 5) document.getElementById('task-btn').disabled = false;
            
            if(state.code) db.ref(`rooms/${state.code}/players/${state.id}`).update({ lat: state.lat, lon: state.lon });
            renderMap();
        }, null, { enableHighAccuracy: true });
    }

    function renderMap() {
        const m = document.getElementById('map-dots'); m.innerHTML = '';
        for(let id in state.players) {
            const p = state.players[id];
            if(!p.lat) continue;
            // Indoor Multiplier: 7000000 for tight indoor movement visibility
            const x = 50 + (p.lon - state.origin.lo) * 7000000;
            const y = 50 + (p.lat - state.origin.la) * 7000000;
            const dot = document.createElement('div');
            dot.className = 'p-dot';
            dot.style.left = Math.min(Math.max(x, 5), 95) + '%';
            dot.style.top = Math.min(Math.max(y, 5), 95) + '%';
            dot.style.color = (id === state.id) ? '#00f3ff' : '#ff003c';
            dot.style.background = dot.style.color;
            m.appendChild(dot);
        }
    }

    async function handleTask() {
        const b = document.getElementById('task-btn'); const v = document.getElementById('v-cam');
        if(b.innerText === "DO TASK") {
            const s = await navigator.mediaDevices.getUserMedia({ video: { facingMode: 'environment' } });
            v.srcObject = s; v.classList.remove('hidden'); b.innerText = "CONFIRM DATA";
        } else {
            const cvs = document.createElement('canvas'); cvs.width = 100; cvs.height = 100;
            cvs.getContext('2d').drawImage(v, 0, 0, 100, 100);
            const crewHash = await getHash(cvs.toDataURL());
            const targetHash = state.tasks[state.cur].hash;
            
            let diff = 0; for(let i=0; i<100; i++) if(crewHash[i] !== targetHash[i]) diff++;
            
            // FAIR AI: 50% match score is enough
            if(diff < 50) { 
                v.srcObject.getTracks().forEach(t => t.stop()); v.classList.add('hidden');
                state.cur++; state.origin = { la: state.lat, lo: state.lon }; // Reset for next 5m
                b.disabled = true; b.innerText = "DO TASK";
                updateHUD(); alert("INTEL VERIFIED! Score: " + (100-diff) + "%");
            } else {
                alert("REJECTED: Low Match (" + (100-diff) + "%). Capture the area properly!");
                b.innerText = "DO TASK";
            }
        }
    }

    function updateHUD() {
        const t = state.tasks[state.cur];
        document.getElementById('task-counter').innerText = `Task: ${state.cur}/${state.tasks.length}`;
        if(t) { document.getElementById('hud-task').innerText = t.name; document.getElementById('hud-img').src = t.img; }
        else { document.getElementById('hud-task').innerText = "OBJECTIVES CLEAR"; document.getElementById('task-btn').style.display = 'none'; }
    }

    async function createLobby() {
        state.code = Math.floor(100000 + Math.random()*900000).toString();
        await db.ref('rooms/'+state.code).set({
            status: 'playing', tasks: state.tasks,
            players: { [state.id]: { name: document.getElementById('p-name').value || 'Agent', role:'Crewmate', status:'alive', lat:0, lon:0 } }
        });
        showScreen('hud'); initGPS(); updateHUD(); sync();
    }

    function joinGame() {
        state.code = document.getElementById('r-code').value;
        if(!state.code) return;
        db.ref(`rooms/${state.code}/players/${state.id}`).set({ name: document.getElementById('p-name').value || 'Agent', role:'Crewmate', status:'alive', lat:0, lon:0 });
        showScreen('hud'); initGPS(); sync();
    }

    function sync() {
        db.ref(`rooms/${state.code}/players`).on('value', s => { state.players = s.val() || {}; renderMap(); });
        db.ref(`rooms/${state.code}/tasks`).once('value', s => { state.tasks = s.val() || []; updateHUD(); });
    }

    function getDist(la1, lo1, la2, lo2) {
        const R = 6371000;
        const dLat = (la2-la1)*Math.PI/180;
        const dLon = (lo2-lo1)*Math.PI/180;
        const a = Math.sin(dLat/2)**2 + Math.cos(la1*Math.PI/180)*Math.cos(la2*Math.PI/180)*Math.sin(dLon/2)**2;
        return R * 2 * Math.atan2(Math.sqrt(a), Math.sqrt(1-a));
    }
</script>
</body>
</html>
