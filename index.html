<!DOCTYPE html>
<html lang="hi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Among Us: Tactical Pro</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-app.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-database.js"></script>
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css" rel="stylesheet">
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Orbitron:wght@900&family=Rajdhani:wght@700&display=swap');
        body { margin: 0; background: #000; color: #fff; font-family: 'Rajdhani', sans-serif; overflow: hidden; touch-action: manipulation; }
        .screen { position: absolute; inset: 0; display: none; padding: 20px; flex-direction: column; background: #000; z-index: 10; }
        .screen.active { display: flex; }
        .glass { background: rgba(255, 255, 255, 0.05); backdrop-filter: blur(10px); border: 1px solid rgba(255, 255, 255, 0.1); border-radius: 15px; }
        
        /* Mega Map Overlay */
        #map-overlay { position: fixed; inset: 0; background: rgba(0,0,0,0.9); z-index: 5000; display: none; padding: 40px 20px; }
        #big-map { width: 100%; height: 70vh; border: 2px solid #00f3ff; border-radius: 30px; position: relative; background: radial-gradient(circle, #0a1520 0%, #000 100%); }
        
        .p-dot { width: 16px; height: 16px; border-radius: 50%; position: absolute; transform: translate(-50%, -50%); border: 2px solid #fff; transition: all 0.5s linear; }
        .body-mark { position: absolute; color: red; transform: translate(-50%, -50%); font-size: 24px; text-shadow: 0 0 10px red; }

        /* Buttons */
        .btn-kill { background: #333; color: #666; transition: 0.3s; }
        .btn-kill.active { background: #ff003c; color: white; box-shadow: 0 0 20px #ff003c; }
        #meeting-ui { position: fixed; inset: 0; background: rgba(0,0,0,0.95); z-index: 10000; display: none; flex-direction: column; align-items: center; justify-content: center; }
    </style>
</head>
<body>

    <div id="scr-end" class="screen items-center justify-center z-[20000] bg-black hidden">
        <h1 id="win-text" class="text-6xl font-['Orbitron'] mb-4">VICTORY</h1>
        <button onclick="location.reload()" class="px-10 py-4 bg-white text-black font-bold rounded-xl">RESTART</button>
    </div>

    <div id="meeting-ui">
        <h2 id="meet-title" class="text-4xl font-['Orbitron'] text-red-500 mb-2">DISCUSSION</h2>
        <div id="meet-timer" class="text-7xl font-['Orbitron'] mb-8">00</div>
        
        <div id="meet-setup" class="w-full max-w-sm text-center">
            <input id="set-disc-time" type="number" value="30" class="w-full bg-white/10 p-4 rounded-xl text-center mb-4 text-2xl border border-white/20" placeholder="Secs">
            <button onclick="confirmMeet()" class="w-full py-4 bg-cyan-600 rounded-xl font-bold">START MEETING</button>
        </div>

        <div id="vote-section" class="w-full max-w-sm hidden">
            <p class="text-cyan-400 mb-4 font-bold">VOTING TIME: <span id="v-timer">20</span>s</p>
            <div id="vote-list" class="grid grid-cols-2 gap-3"></div>
        </div>
    </div>

    <div id="map-overlay">
        <h2 class="text-center font-['Orbitron'] text-cyan-400 mb-4">TACTICAL MAP</h2>
        <div id="big-map"><div id="map-players"></div></div>
        <button onclick="toggleMap()" class="w-full mt-6 py-4 bg-white/10 rounded-xl font-bold border border-white/20">CLOSE MAP</button>
    </div>

    <div id="scr-login" class="screen active justify-center">
        <h1 class="text-5xl font-black italic text-center mb-10">TACTICAL<br><span class="text-cyan-400 font-['Orbitron'] text-2xl">AMONG US</span></h1>
        <div class="glass p-6 space-y-4">
            <input id="p-name" type="text" placeholder="YOUR NAME" class="w-full bg-black/50 p-4 rounded-xl border border-white/10 text-center font-bold uppercase">
            <button onclick="initApp()" class="w-full py-5 bg-gradient-to-r from-blue-600 to-cyan-400 rounded-xl font-black">INITIALIZE</button>
        </div>
    </div>

    <div id="scr-mode" class="screen justify-center space-y-4">
        <button onclick="show('scr-setup')" class="glass p-10 text-center border-cyan-500/30">
            <i class="fas fa-satellite-dish text-4xl mb-4 text-cyan-400"></i>
            <h3 class="font-bold">CREATE ROOM</h3>
        </button>
        <div class="glass p-6 flex flex-col gap-4">
            <input id="join-code" type="text" placeholder="6-DIGIT CODE" class="bg-black/50 p-4 rounded-xl text-center border border-white/10">
            <button onclick="joinGame()" class="w-full bg-green-600 py-4 rounded-xl font-bold">JOIN SYNC</button>
        </div>
    </div>

    <div id="scr-setup" class="screen">
        <h2 class="text-2xl font-bold text-cyan-400 mb-4 font-['Orbitron']">INTEL SETUP</h2>
        <div class="glass p-4 space-y-3">
            <input id="t-name" type="text" placeholder="TASK NAME" class="w-full bg-black p-4 rounded-xl border border-white/10">
            <input type="file" id="t-file" class="hidden" accept="image/*" onchange="handleFile(this)">
            <button onclick="document.getElementById('t-file').click()" class="w-full py-10 border-2 border-dashed border-white/20 rounded-xl text-gray-500 font-bold">
                <img id="t-prev" class="hidden w-full h-full object-cover rounded-xl">
                <span id="t-hint">CAPTURE TARGET</span>
            </button>
            <button onclick="saveTask()" class="w-full py-4 bg-cyan-900 rounded-xl font-bold">SAVE TASK</button>
        </div>
        <div id="t-list" class="flex gap-2 mt-4 overflow-x-auto pb-2"></div>
        <button onclick="createRoom()" class="mt-auto py-5 bg-gradient-to-r from-blue-700 to-cyan-500 rounded-xl font-black">OPEN LOBBY</button>
    </div>

    <div id="scr-lobby" class="screen items-center justify-center text-center">
        <p class="text-cyan-400 font-bold tracking-[0.3em] mb-2">ROOM CODE</p>
        <h1 id="view-code" class="text-7xl font-black mb-10 font-['Orbitron']">000000</h1>
        <div id="p-list" class="w-full glass p-6 min-h-[200px] mb-10 space-y-2"></div>
        <button id="start-btn" onclick="launch()" class="hidden w-full bg-green-600 py-5 rounded-xl font-black text-xl">START MISSION</button>
    </div>

    <div id="scr-hud" class="screen">
        <div class="flex justify-between items-center mb-4">
            <div>
                <h2 id="hud-role" class="text-3xl font-black italic uppercase">CREWMATE</h2>
                <p id="hud-gps" class="text-[10px] text-cyan-500 font-mono">GPS: FIXING...</p>
            </div>
            <div class="flex gap-2">
                <button onclick="toggleMap()" class="bg-white/10 p-3 rounded-xl border border-white/20"><i class="fas fa-map"></i></button>
                <button onclick="callMeeting()" class="bg-orange-600 px-4 py-2 rounded-xl text-xs font-bold">EMERGENCY</button>
            </div>
        </div>

        <div class="glass p-4 flex items-center gap-4 mb-4">
            <img id="hud-task-img" class="w-16 h-16 object-cover rounded-lg border border-white/20 opacity-50">
            <div>
                <p class="text-[10px] text-cyan-400 font-bold uppercase">Current Intel</p>
                <h3 id="hud-task-name" class="text-xl font-bold">WAITING...</h3>
            </div>
        </div>

        <video id="v-cam" class="hidden w-full h-40 bg-black rounded-3xl border-2 border-cyan-500/30 mb-4 object-cover" autoplay playsinline></video>

        <div class="grid grid-cols-2 gap-4 mt-auto pb-4">
            <button id="task-btn" onclick="runTask()" class="py-10 bg-gradient-to-b from-cyan-500 to-blue-700 rounded-3xl font-black text-xl">TASK</button>
            <div class="flex flex-col gap-4">
                <button id="kill-btn" onclick="killPlayer()" class="btn-kill flex-1 rounded-3xl font-black text-xl hidden">KILL</button>
                <button id="report-btn" onclick="report()" class="bg-red-900/20 text-red-500 border border-red-500 rounded-3xl flex-1 font-black opacity-30">REPORT</button>
            </div>
        </div>
    </div>

<script>
    // --- BASIC SETUP ---
    const firebaseConfig = {
        apiKey: "AIzaSyDbR67XE2iBcqQUkrDjjr7LQtLUNpyUdB8",
        databaseURL: "https://rl-amongus-real-life-amo-5542a-default-rtdb.firebaseio.com",
        projectId: "rl-amongus-real-life-amo-5542a",
        appId: "1:811874974870:web:db729403e3c241c1d76b7"
    };
    firebase.initializeApp(firebaseConfig);
    const db = firebase.database();

    let state = { id: 'p_'+Math.random().toString(36).substr(2,4), name:'', code:'', tasks:[], cur:0, role:'Crewmate', status:'alive', lat:0, lon:0, origin:{la:0, lo:0}, players:{} };

    function show(id) {
        document.querySelectorAll('.screen').forEach(s => s.classList.remove('active'));
        document.getElementById(id).classList.add('active');
    }

    function initApp() {
        state.name = document.getElementById('p-name').value.toUpperCase();
        if(state.name.length < 2) return;
        show('scr-mode');
    }

    function toggleMap() {
        const m = document.getElementById('map-overlay');
        m.style.display = m.style.display === 'block' ? 'none' : 'block';
    }

    // --- TASK LOGIC ---
    async function getHash(src) {
        return new Promise(res => {
            const img = new Image(); img.src = src; img.onload = () => {
                const c = document.createElement('canvas'); const ctx = c.getContext('2d');
                c.width = 12; c.height = 12; ctx.drawImage(img,0,0,12,12);
                const d = ctx.getImageData(0,0,12,12).data;
                let h = ""; for(let i=0; i<d.length; i+=4) h += ((d[i]+d[i+1]+d[i+2])/3 > 125 ? "1" : "0");
                res(h);
            };
        });
    }

    function handleFile(input) {
        const r = new FileReader();
        r.onload = async (e) => {
            document.getElementById('t-prev').src = e.target.result;
            document.getElementById('t-prev').classList.remove('hidden');
            document.getElementById('t-hint').classList.add('hidden');
            state.tempHash = await getHash(e.target.result);
        };
        r.readAsDataURL(input.files[0]);
    }

    function saveTask() {
        const n = document.getElementById('t-name').value;
        const i = document.getElementById('t-prev').src;
        if(!n || !state.tempHash) return;
        state.tasks.push({ name: n, img: i, hash: state.tempHash });
        document.getElementById('t-list').innerHTML += `<img src="${i}" class="w-12 h-12 rounded border border-cyan-500">`;
        document.getElementById('t-name').value = '';
        document.getElementById('t-prev').classList.add('hidden');
        document.getElementById('t-hint').classList.remove('hidden');
    }

    // --- GAME ENGINE ---
    async function createRoom() {
        state.code = Math.floor(100000 + Math.random()*900000).toString();
        await db.ref('rooms/'+state.code).set({ status:'lobby', tasks: state.tasks });
        joinGame(state.code);
        document.getElementById('start-btn').classList.remove('hidden');
    }

    function joinGame(c) {
        state.code = c || document.getElementById('join-code').value;
        if(!state.code) return;
        db.ref(`rooms/${state.code}/players/${state.id}`).set({ name: state.name, role:'Crewmate', status:'alive', lat:0, lon:0, id: state.id });
        document.getElementById('view-code').innerText = state.code;
        show('scr-lobby');
        sync();
    }

    function sync() {
        db.ref(`rooms/${state.code}/players`).on('value', snap => {
            state.players = snap.val() || {};
            document.getElementById('p-list').innerHTML = Object.values(state.players).map(p => `<div class="p-3 bg-white/5 border-l-4 border-cyan-500 font-bold">${p.name}</div>`).join('');
            
            if(state.players[state.id]) {
                state.role = state.players[state.id].role;
                state.status = state.players[state.id].status;
                document.getElementById('hud-role').innerText = state.role;
                document.getElementById('hud-role').style.color = state.role === 'Impostor' ? '#ff003c' : '#00f3ff';
                if(state.role === 'Impostor') document.getElementById('kill-btn').classList.remove('hidden');
            }
            updateMap();
            checkKillReport();
            checkWin();
        });

        db.ref(`rooms/${state.code}/status`).on('value', s => {
            if(s.val() === 'playing') {
                show('scr-hud');
                initGPS();
                db.ref(`rooms/${state.code}/tasks`).once('value', t => { state.tasks = t.val(); updateHUD(); });
            }
        });

        db.ref(`rooms/${state.code}/meeting`).on('value', snap => {
            const m = snap.val();
            if(m && m.active) handleMeetingLogic(m);
            else document.getElementById('meeting-ui').style.display = 'none';
        });
    }

    function launch() {
        const ids = Object.keys(state.players);
        const imp = ids[Math.floor(Math.random()*ids.length)];
        ids.forEach(id => db.ref(`rooms/${state.code}/players/${id}`).update({ role: id===imp?'Impostor':'Crewmate' }));
        db.ref(`rooms/${state.code}`).update({ status: 'playing' });
    }

    // --- GPS & MAP ---
    function initGPS() {
        navigator.geolocation.watchPosition(p => {
            if(state.origin.la === 0) { state.origin.la = p.coords.latitude; state.origin.lo = p.coords.longitude; }
            state.lat = p.coords.latitude; state.lon = p.coords.longitude;
            document.getElementById('hud-gps').innerText = `LAT: ${state.lat.toFixed(5)} LON: ${state.lon.toFixed(5)}`;
            db.ref(`rooms/${state.code}/players/${state.id}`).update({ lat: state.lat, lon: state.lon });
        }, null, { enableHighAccuracy: true, distanceFilter: 1 });
    }

    function updateMap() {
        const map = document.getElementById('map-players'); map.innerHTML = '';
        for(let id in state.players) {
            const p = state.players[id];
            if(p.status === 'dead') {
                map.innerHTML += `<div class="body-mark" style="left:${50+(p.lon-state.origin.lo)*1000000}%; top:${50+(p.lat-state.origin.la)*1000000}%"><i class="fas fa-skull"></i></div>`;
                continue;
            }
            const dot = document.createElement('div');
            dot.className = 'p-dot';
            dot.style.left = 50 + (p.lon - state.origin.lo) * 1000000 + '%';
            dot.style.top = 50 + (p.lat - state.origin.la) * 1000000 + '%';
            dot.style.background = (id === state.id) ? '#00f3ff' : (state.role==='Impostor'?'#ff003c':'#fff');
            map.appendChild(dot);
        }
    }

    // --- KILL & REPORT LOGIC ---
    function checkKillReport() {
        if(state.status === 'dead') return;
        let canKill = false;
        let canReport = false;

        for(let id in state.players) {
            if(id === state.id) continue;
            const p = state.players[id];
            const dist = getDist(state.lat, state.lon, p.lat, p.lon);

            if(state.role === 'Impostor' && p.role === 'Crewmate' && p.status === 'alive' && dist < 4) canKill = true;
            if(p.status === 'dead' && dist < 5) canReport = true;
        }

        const kb = document.getElementById('kill-btn');
        if(canKill) kb.classList.add('active'); else kb.classList.remove('active');

        const rb = document.getElementById('report-btn');
        if(canReport) rb.style.opacity = "1"; else rb.style.opacity = "0.3";
    }

    function killPlayer() {
        if(!document.getElementById('kill-btn').classList.contains('active')) return;
        for(let id in state.players) {
            const p = state.players[id];
            if(p.role === 'Crewmate' && p.status === 'alive' && getDist(state.lat, state.lon, p.lat, p.lon) < 4) {
                db.ref(`rooms/${state.code}/players/${id}`).update({ status: 'dead' });
                alert("Target Neutralized!");
                break;
            }
        }
    }

    function report() {
        if(document.getElementById('report-btn').style.opacity === "1") callMeeting();
    }

    // --- MEETING LOGIC ---
    function callMeeting() {
        if(state.status === 'dead') return;
        document.getElementById('meeting-ui').style.display = 'flex';
        document.getElementById('meet-setup').style.display = 'block';
        document.getElementById('vote-section').style.display = 'none';
    }

    function confirmMeet() {
        const dt = document.getElementById('set-disc-time').value || 30;
        db.ref(`rooms/${state.code}/meeting`).set({ active: true, phase: 'disc', time: dt, start: Date.now(), caller: state.id });
    }

    function handleMeetingLogic(m) {
        document.getElementById('meeting-ui').style.display = 'flex';
        const elapsed = Math.floor((Date.now() - m.start)/1000);
        
        if(m.phase === 'disc') {
            const rem = m.time - elapsed;
            document.getElementById('meet-timer').innerText = rem > 0 ? rem : "VOTE";
            if(rem <= 0 && state.id === m.caller) {
                db.ref(`rooms/${state.code}/meeting`).update({ phase: 'vote', start: Date.now() });
            }
        } else {
            document.getElementById('meet-setup').style.display = 'none';
            document.getElementById('vote-section').style.display = 'block';
            const rem = 20 - elapsed;
            document.getElementById('v-timer').innerText = rem;
            if(document.getElementById('vote-list').innerHTML === "") renderVoteList();
            if(rem <= 0 && state.id === m.caller) tallyVotes();
        }
    }

    function renderVoteList() {
        const list = document.getElementById('vote-list'); list.innerHTML = "";
        Object.values(state.players).forEach(p => {
            if(p.status === 'alive') {
                const b = document.createElement('button');
                b.className = "p-3 bg-white/10 rounded-xl font-bold text-xs";
                b.innerText = p.name;
                b.onclick = () => {
                    db.ref(`rooms/${state.code}/votes/${p.id}`).transaction(c => (c||0)+1);
                    list.innerHTML = "<p class='col-span-2 text-cyan-400'>VOTE RECORDED</p>";
                };
                list.appendChild(b);
            }
        });
    }

    async function tallyVotes() {
        const snap = await db.ref(`rooms/${state.code}/votes`).once('value');
        const votes = snap.val() || {};
        let max = 0, target = null;
        for(let id in votes) { if(votes[id] > max) { max = votes[id]; target = id; } }
        
        if(target) {
            db.ref(`rooms/${state.code}/players/${target}`).update({ status: 'dead' });
            alert(state.players[target].name + " was " + state.players[target].role);
        }
        db.ref(`rooms/${state.code}/meeting`).remove();
        db.ref(`rooms/${state.code}/votes`).remove();
        document.getElementById('vote-list').innerHTML = "";
    }

    // --- TASK EXECUTION ---
    async function runTask() {
        const b = document.getElementById('task-btn'); const v = document.getElementById('v-cam');
        if(b.innerText === "TASK") {
            const s = await navigator.mediaDevices.getUserMedia({ video: { facingMode: 'environment' } });
            v.srcObject = s; v.classList.remove('hidden'); b.innerText = "VERIFY";
        } else {
            const c = document.createElement('canvas'); c.width=100; c.height=100;
            c.getContext('2d').drawImage(v,0,0,100,100);
            const h = await getHash(c.toDataURL());
            let diff=0; for(let i=
