<!DOCTYPE html>
<html lang="hi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>Among Us: Tactical Perfect</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-app.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-database.js"></script>
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css" rel="stylesheet">
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Orbitron:wght@900&family=Rajdhani:wght@700&display=swap');
        body { margin: 0; background: #000; color: #fff; font-family: 'Rajdhani', sans-serif; overflow: hidden; touch-action: manipulation; }
        .screen { position: absolute; inset: 0; display: none; padding: 20px; flex-direction: column; background: #000; z-index: 10; }
        .screen.active { display: flex !important; }
        .glass { background: rgba(255, 255, 255, 0.05); backdrop-filter: blur(12px); border: 1px solid rgba(255, 255, 255, 0.1); border-radius: 20px; }
        
        #map-overlay { position: fixed; inset: 0; background: #000; z-index: 5000; display: none; flex-direction: column; padding: 10px; }
        #big-map { width: 100%; height: 82vh; border: 2px solid #00f3ff; border-radius: 25px; position: relative; background: radial-gradient(circle, #0a1520 0%, #000 100%); overflow: hidden; }
        
        .p-dot { width: 18px; height: 18px; border-radius: 50%; position: absolute; transform: translate(-50%, -50%); border: 2px solid #fff; transition: all 0.5s linear; box-shadow: 0 0 10px rgba(0,243,255,0.5); }
        .body-mark { position: absolute; color: #ff003c; transform: translate(-50%, -50%); font-size: 28px; text-shadow: 0 0 15px red; }

        .btn-kill { background: #222; color: #444; transition: 0.3s; pointer-events: none; }
        .btn-kill.active { background: #ff003c !important; color: white !important; box-shadow: 0 0 25px #ff003c; pointer-events: auto; }
        #meeting-ui { position: fixed; inset: 0; background: rgba(0,0,0,0.98); z-index: 10000; display: none; flex-direction: column; align-items: center; justify-content: center; }
    </style>
</head>
<body>

    <div id="scr-login" class="screen active justify-center">
        <h1 class="text-6xl font-black italic text-center mb-10 tracking-tighter">TACTICAL<br><span class="text-cyan-400 font-['Orbitron'] text-2xl tracking-[0.3em]">AMONG US</span></h1>
        <div class="glass p-8 space-y-5">
            <input id="p-name" type="text" placeholder="AGENT NAME" class="w-full bg-black/60 p-5 rounded-2xl border border-white/10 text-center font-bold uppercase text-cyan-400 text-xl focus:outline-none focus:border-cyan-500">
            <button onclick="initApp()" class="w-full py-5 bg-gradient-to-r from-blue-600 to-cyan-500 rounded-2xl font-black text-white text-2xl active:scale-95 transition-transform">INITIALIZE</button>
        </div>
    </div>

    <div id="scr-mode" class="screen justify-center space-y-6">
        <button onclick="show('scr-setup')" class="glass p-12 text-center border-cyan-500/30 active:bg-cyan-500/10">
            <i class="fas fa-satellite-dish text-6xl mb-4 text-cyan-400"></i>
            <h3 class="text-2xl font-black uppercase">Host Mission</h3>
        </button>
        <div class="glass p-8 flex flex-col gap-4">
            <input id="join-code" type="text" placeholder="6-DIGIT CODE" class="bg-black/50 p-4 rounded-xl text-center border border-white/10 text-2xl font-mono uppercase focus:outline-none">
            <button onclick="joinGame()" class="w-full bg-green-600 py-5 rounded-xl font-black text-xl uppercase active:scale-95">Join Sync</button>
        </div>
    </div>

    <div id="scr-setup" class="screen overflow-y-auto">
        <h2 class="text-3xl font-bold text-cyan-400 mb-6 font-['Orbitron']">INTEL SETUP</h2>
        <div class="glass p-6 space-y-5">
            <input id="t-name" type="text" placeholder="LOCATION NAME" class="w-full bg-black p-5 rounded-xl border border-white/10 font-bold">
            <input type="file" id="t-file" class="hidden" accept="image/*" onchange="handleFile(this)">
            <button onclick="document.getElementById('t-file').click()" id="upload-box" class="w-full py-12 border-2 border-dashed border-cyan-500/30 rounded-2xl text-gray-400 font-bold flex flex-col items-center justify-center gap-3 bg-black/40">
                <i class="fas fa-camera text-3xl"></i>
                <span id="t-hint">TAP TO CAPTURE TARGET</span>
                <img id="t-prev" class="hidden w-full h-40 object-cover rounded-xl mt-2 border-2 border-cyan-500">
            </button>
            <button onclick="saveTask()" class="w-full py-5 bg-cyan-600 rounded-2xl font-black text-xl uppercase shadow-lg shadow-cyan-500/20">Add Task</button>
        </div>
        <div id="t-list" class="flex gap-4 mt-6 overflow-x-auto p-2"></div>
        <button onclick="createRoom()" class="mt-10 py-6 bg-gradient-to-r from-blue-700 to-cyan-500 rounded-2xl font-black text-2xl mb-10">OPEN LOBBY</button>
    </div>

    <div id="scr-lobby" class="screen items-center justify-center text-center">
        <p class="text-cyan-400 font-bold tracking-[0.5em] mb-2 text-sm uppercase">Room Code</p>
        <h1 id="view-code" class="text-8xl font-black mb-10 font-['Orbitron']">000000</h1>
        <div id="p-list" class="w-full glass p-8 min-h-[200px] mb-12 space-y-3"></div>
        <button id="start-btn" onclick="launch()" class="hidden w-full bg-green-600 py-6 rounded-2xl font-black text-2xl uppercase">Start Mission</button>
    </div>

    <div id="scr-hud" class="screen">
        <div class="flex justify-between items-center mb-4">
            <div>
                <h2 id="hud-role" class="text-4xl font-black italic uppercase leading-none">CREWMATE</h2>
                <p id="hud-gps" class="text-[11px] text-cyan-500 font-mono mt-2 font-bold uppercase tracking-widest">GPS: SYNCING...</p>
            </div>
            <div class="flex gap-3">
                <button onclick="toggleMap()" class="bg-white/10 p-4 rounded-2xl border border-white/20 text-xl"><i class="fas fa-map-marked-alt text-cyan-400"></i></button>
                <button onclick="callMeeting()" class="bg-orange-600 px-5 py-3 rounded-2xl text-[10px] font-black uppercase">Emergency</button>
            </div>
        </div>

        <div class="glass p-5 flex items-center gap-5 mb-5 border-l-4 border-cyan-500">
            <img id="hud-task-img" src="" class="w-20 h-20 object-cover rounded-xl border-2 border-white/10 opacity-70">
            <div>
                <p class="text-[10px] text-cyan-400 font-black uppercase">Objective</p>
                <h3 id="hud-task-name" class="text-2xl font-black uppercase tracking-tighter">WAITING...</h3>
            </div>
        </div>

        <video id="v-cam" class="hidden w-full h-48 bg-black rounded-[30px] border-2 border-cyan-500/30 mb-5 object-cover" autoplay playsinline></video>

        <div class="grid grid-cols-2 gap-5 mt-auto pb-6">
            <button id="task-btn" onclick="runTask()" class="py-12 bg-gradient-to-b from-cyan-500 to-blue-700 rounded-[35px] font-black text-2xl shadow-xl">TASK</button>
            <div class="flex flex-col gap-5">
                <button id="kill-btn" onclick="killPlayer()" class="btn-kill flex-1 rounded-[30px] font-black text-xl hidden">KILL</button>
                <button id="report-btn" onclick="report()" class="bg-red-900/20 text-red-500 border-2 border-red-500/30 rounded-[30px] flex-1 font-black text-sm opacity-30">REPORT</button>
            </div>
        </div>
    </div>

    <div id="map-overlay">
        <h2 class="text-center font-['Orbitron'] text-cyan-400 text-2xl py-4 uppercase">Mega Map</h2>
        <div id="big-map"><div id="map-players"></div></div>
        <button onclick="toggleMap()" class="w-full mt-4 py-6 bg-white/10 rounded-2xl font-black text-xl border border-white/20 uppercase">Exit Map</button>
    </div>

    <div id="meeting-ui">
        <h2 id="meet-title" class="text-5xl font-['Orbitron'] text-red-500 mb-2 italic">DISCUSSION</h2>
        <div id="meet-timer" class="text-9xl font-['Orbitron'] mb-10">00</div>
        <div id="meet-setup" class="w-full max-w-sm text-center p-6 glass">
            <input id="set-disc-time" type="number" value="30" class="w-full bg-black p-6 rounded-2xl text-center mb-6 text-4xl border border-cyan-500/30 text-cyan-400 font-black">
            <button onclick="confirmMeet()" class="w-full py-5 bg-cyan-600 rounded-2xl font-black text-xl uppercase">Start Timer</button>
        </div>
        <div id="vote-section" class="w-full max-w-sm hidden px-4">
            <p class="text-cyan-400 mb-6 font-black text-center text-xl uppercase">Voting: <span id="v-timer" class="text-white">20</span>s</p>
            <div id="vote-list" class="grid grid-cols-2 gap-4"></div>
        </div>
    </div>

<script>
    // --- GLOBAL STATE ---
    let state = { id: 'p_'+Math.random().toString(36).substr(2,4), name:'', code:'', tasks:[], cur:0, role:'Crewmate', status:'alive', lat:0, lon:0, origin:{la:0, lo:0}, players:{} };

    // --- NAVIGATION (SABSE PEHLE YE CHALAYEGA) ---
    function show(id) {
        document.querySelectorAll('.screen').forEach(s => s.classList.remove('active'));
        const target = document.getElementById(id);
        if(target) target.classList.add('active');
    }

    function initApp() {
        const val = document.getElementById('p-name').value;
        if(val.trim().length < 2) {
            alert("Naam toh likho bhai!");
            return;
        }
        state.name = val.toUpperCase();
        show('scr-mode'); // INSTANT SCREEN CHANGE
    }

    // --- FIREBASE CONFIG ---
    const firebaseConfig = {
        apiKey: "AIzaSyDbR67XE2iBcqQUkrDjjr7LQtLUNpyUdB8",
        databaseURL: "https://rl-amongus-real-life-amo-5542a-default-rtdb.firebaseio.com",
        projectId: "rl-amongus-real-life-amo-5542a",
        appId: "1:811874974870:web:db729403e3c241c1d76b7"
    };
    firebase.initializeApp(firebaseConfig);
    const db = firebase.database();

    // --- TASK MANAGEMENT (FIXED IMAGE & SAVE) ---
    function handleFile(input) {
        if (!input.files || !input.files[0]) return;
        const reader = new FileReader();
        reader.onload = (e) => {
            const img = document.getElementById('t-prev');
            img.src = e.target.result;
            img.classList.remove('hidden');
            document.getElementById('t-hint').classList.add('hidden');
        };
        reader.readAsDataURL(input.files[0]);
    }

    function saveTask() {
        const name = document.getElementById('t-name').value;
        const imgData = document.getElementById('t-prev').src;
        if(!name || imgData.includes('t-hint')) return alert("Photo aur Name dono chahiye!");

        state.tasks.push({ name, img: imgData });
        
        // Update List UI
        const list = document.getElementById('t-list');
        const item = document.createElement('div');
        item.className = "flex-shrink-0 w-16 h-16 rounded-xl border-2 border-cyan-500 overflow-hidden";
        item.innerHTML = `<img src="${imgData}" class="w-full h-full object-cover">`;
        list.appendChild(item);

        // Reset
        document.getElementById('t-name').value = '';
        document.getElementById('t-prev').classList.add('hidden');
        document.getElementById('t-hint').classList.remove('hidden');
    }

    // --- GPS & SMOOTHING ---
    function initGPS() {
        navigator.geolocation.watchPosition(p => {
            let lat = p.coords.latitude;
            let lon = p.coords.longitude;
            if(state.origin.la === 0) { state.origin.la = lat; state.origin.lo = lon; }
            state.lat = lat; state.lon = lon;
            document.getElementById('hud-gps').innerText = `SAT_LINK: STABLE | ${lat.toFixed(5)}`;
            db.ref(`rooms/${state.code}/players/${state.id}`).update({ lat, lon });
        }, null, { enableHighAccuracy: true });
    }

    // --- SYNC & ACTIONS ---
    async function createRoom() {
        if(state.tasks.length === 0) return alert("Task add karo!");
        state.code = Math.floor(100000 + Math.random()*900000).toString();
        await db.ref('rooms/'+state.code).set({ status:'lobby', tasks: state.tasks });
        joinGame(state.code);
        document.getElementById('start-btn').classList.remove('hidden');
    }

    function joinGame(override) {
        state.code = override || document.getElementById('join-code').value.toUpperCase();
        if(!state.code) return;
        db.ref(`rooms/${state.code}/players/${state.id}`).set({ name: state.name, role:'Crewmate', status:'alive', lat:0, lon:0, id: state.id });
        document.getElementById('view-code').innerText = state.code;
        show('scr-lobby');
        sync();
    }

    function sync() {
        db.ref(`rooms/${state.code}/players`).on('value', snap => {
            state.players = snap.val() || {};
            const plist = document.getElementById('p-list');
            plist.innerHTML = Object.values(state.players).map(p => `<div class="p-4 bg-white/5 border-l-4 border-cyan-500 font-bold uppercase text-xs">${p.name}</div>`).join('');
            
            const me = state.players[state.id];
            if(me) {
                state.role = me.role; state.status = me.status;
                document.getElementById('hud-role').innerText = state.role;
                document.getElementById('hud-role').style.color = state.role === 'Impostor' ? '#ff003c' : '#00f3ff';
                if(state.role === 'Impostor') document.getElementById('kill-btn').classList.remove('hidden');
            }
            updateMap();
            checkActions();
        });

        db.ref(`rooms/${state.code}/status`).on('value', s => {
            if(s.val() === 'playing') {
                show('scr-hud');
                initGPS();
                db.ref(`rooms/${state.code}/tasks`).once('value', t => { state.tasks = t.val(); updateHUD(); });
            }
        });

        db.ref(`rooms/${state.code}/meeting`).on('value', snap => {
            const m = snap.val();
            if(m && m.active) handleMeetingUI(m);
            else document.getElementById('meeting-ui').style.display = 'none';
        });
    }

    function launch() {
        const ids = Object.keys(state.players);
        const imp = ids[Math.floor(Math.random()*ids.length)];
        ids.forEach(id => db.ref(`rooms/${state.code}/players/${id}`).update({ role: id===imp?'Impostor':'Crewmate' }));
        db.ref(`rooms/${state.code}`).update({ status: 'playing' });
    }

    function updateMap() {
        const map = document.getElementById('map-players'); map.innerHTML = '';
        for(let id in state.players) {
            const p = state.players[id];
            if(p.status === 'dead') {
                map.innerHTML += `<div class="body-mark" style="left:${50+(p.lon-state.origin.lo)*1500000}%; top:${50+(p.lat-state.origin.la)*1500000}%"><i class="fas fa-skull"></i></div>`;
                continue;
            }
            const dot = document.createElement('div');
            dot.className = 'p-dot';
            dot.style.left = 50 + (p.lon - state.origin.lo) * 1500000 + '%';
            dot.style.top = 50 + (p.lat - state.origin.la) * 1500000 + '%';
            dot.style.background = (id === state.id) ? '#00f3ff' : (state.role==='Impostor'?'#ff003c':'#fff');
            map.appendChild(dot);
        }
    }

    function checkActions() {
        if(state.status === 'dead') return;
        let canKill = false, canReport = false;
        for(let id in state.players) {
            if(id === state.id) continue;
            const p = state.players[id];
            const d = getDist(state.lat, state.lon, p.lat, p.lon);
            if(state.role === 'Impostor' && p.role === 'Crewmate' && p.status === 'alive' && d < 4) canKill = true;
            if(p.status === 'dead' && d < 5) canReport = true;
        }
        const kb = document.getElementById('kill-btn');
        if(canKill) kb.classList.add('active'); else kb.classList.remove('active');
        document.getElementById('report-btn').style.opacity = canReport ? "1" : "0.3";
    }

    function killPlayer() {
        if(!document.getElementById('kill-btn').classList.contains('active')) return;
        for(let id in state.players) {
            const p = state.players[id];
            if(p.role === 'Crewmate' && p.status === 'alive' && getDist(state.lat, state.lon, p.lat, p.lon) < 4) {
                db.ref(`rooms/${state.code}/players/${id}`).update({ status: 'dead' });
                alert("Target Neutralized!"); break;
            }
        }
    }

    function toggleMap() {
        const m = document.getElementById('map-overlay');
        m.style.display = m.style.display === 'flex' ? 'none' : 'flex';
    }

    // --- MEETING ---
    function callMeeting() {
        if(state.status === 'dead') return;
        db.ref(`rooms/${state.code}/meeting`).set({ active: true, phase: 'setup' });
    }

    function confirmMeet() {
        const t = document.getElementById('set-disc-time').value || 30;
        db.ref(`rooms/${state.code}/meeting`).update({ active: true, phase: 'disc', time: t, start: Date.now(), caller: state.id });
    }

    function handleMeetingUI(m) {
        document.getElementById('meeting-ui').style.display = 'flex';
        if(m.phase === 'setup') {
            document.getElementById('meet-setup').style.display = 'block';
            document.getElementById('vote-section').style.display = 'none';
        } else if(m.phase === 'disc') {
            document.getElementById('meet-setup').style.display = 'none';
            const rem = m.time - Math.floor((Date.now() - m.start)/1000);
            document.getElementById('meet-timer').innerText = rem > 0 ? rem : "VOTE";
            if(rem <= 0 && state.id === m.caller) db.ref(`rooms/${state.code}/meeting`).update({ phase: 'vote', start: Date.now() });
        } else {
            document.getElementById('vote-section').style.display = 'block';
            const rem = 20 - Math.floor((Date.now() - m.start)/1000);
            document.getElementById('v-timer').innerText = rem;
            if(document.getElementById('vote-list').innerHTML === "") renderVoteList();
            if(rem <= 0 && state.id === m.caller) tallyVotes();
        }
    }

    function renderVoteList() {
        const list = document.getElementById('vote-list'); list.innerHTML = "";
        Object.values(state.players).forEach(p => {
            if(p.status === 'alive') {
                const b = document.createElement('button'); b.className = "p-5 bg-white/10 rounded-2xl font-black text-xs uppercase";
                b.innerText = p.name;
                b.onclick = () => { db.ref(`rooms/${state.code}/votes/${p.id}`).transaction(c => (c||0)+1); list.innerHTML = "<p class='col-span-2 text-cyan-400 font-bold'>VOTE RECORDED</p>"; };
                list.appendChild(b);
            }
        });
    }

    async function tallyVotes() {
        const snap = await db.ref(`rooms/${state.code}/votes`).once('value');
        const v = snap.val() || {};
        let max = 0, target = null;
        for(let id in v) { if(v[id] > max) { max = v[id]; target = id; } }
        if(target) { db.ref(`rooms/${state.code}/players/${target}`).update({ status: 'dead' }); }
        db.ref(`rooms/${state.code}/meeting`).remove(); db.ref(`rooms/${state.code}/votes`).remove();
    }

    async function runTask() {
        const b = document.getElementById('task-btn'); const v = document.getElementById('v-cam');
        if(b.innerText === "TASK") {
            const s = await navigator.mediaDevices.getUserMedia({ video: { facingMode: 'environment' } });
            v.srcObject = s; v.cla
