<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>AI RC AR Car (No ARCore)</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
    <script src="https://unpkg.com/ml5@latest/dist/ml5.min.js"></script>
    <style>
        body { margin: 0; overflow: hidden; background: #000; font-family: sans-serif; }
        canvas { display: block; }
        #video { position: fixed; top: 0; left: 0; width: 100%; height: 100%; object-fit: cover; z-index: -1; }
        .controls { position: fixed; bottom: 20px; left: 50%; transform: translateX(-50%); display: flex; gap: 10px; z-index: 10; }
        button { width: 60px; height: 60px; border-radius: 50%; border: none; background: rgba(255,255,255,0.3); color: white; font-weight: bold; }
        #ui { position: fixed; top: 10px; left: 10px; color: cyan; z-index: 10; font-size: 12px; }
        #slider-cont { position: fixed; right: 10px; top: 50%; transform: translateY(-50%); display: flex; flex-direction: column; align-items: center; color: white; }
        input[type=range] { writing-mode: bt-lr; appearance: slider-vertical; width: 8px; height: 200px; }
    </style>
</head>
<body>

    <video id="video" autoplay playsinline></video>
    
    <div id="ui">AI Status: <span id="status">Loading AI...</span></div>

    <div id="slider-cont">
        <span>SIZE</span>
        <input type="range" id="sizeSlider" min="0.1" max="2" step="0.1" value="0.5">
    </div>

    <div class="controls">
        <button id="btn-left">L</button>
        <button id="btn-up">UP</button>
        <button id="btn-down">DN</button>
        <button id="btn-right">R</button>
    </div>

    <script>
        let scene, camera, renderer, car, objectDetector;
        let moveForward = false, moveBackward = false, turnLeft = false, turnRight = false;
        let isObstacle = false;

        // 1. Setup Camera Background
        async function setupCamera() {
            const video = document.getElementById('video');
            const stream = await navigator.mediaDevices.getUserMedia({ video: { facingMode: "environment" }, audio: false });
            video.srcObject = stream;
            return new Promise((resolve) => video.onloadedmetadata = () => resolve(video));
        }

        // 2. Setup 3D Scene
        function init3D() {
            scene = new THREE.Scene();
            camera = new THREE.PerspectiveCamera(75, window.innerWidth / window.innerHeight, 0.1, 1000);
            renderer = new THREE.WebGLRenderer({ alpha: true });
            renderer.setSize(window.innerWidth, window.innerHeight);
            document.body.appendChild(renderer.domElement);

            // Lighting
            const light = new THREE.HemisphereLight(0xffffff, 0x444444, 1);
            scene.add(light);

            // Simple Car Box (Jab tak aap model load na karein)
            const geometry = new THREE.BoxGeometry(1, 0.5, 2);
            const material = new THREE.MeshPhongMaterial({ color: 0xff0000 });
            car = new THREE.Mesh(geometry, material);
            car.position.set(0, -2, -10); // Screen ke thoda door
            scene.add(car);

            camera.position.z = 5;
            animate();
        }

        // 3. AI Sensing (Object Detection)
        function startAI() {
            objectDetector = ml5.objectDetector('cocossd', {}, modelLoaded);
        }

        function modelLoaded() {
            document.getElementById('status').innerText = "AI Active";
            detect();
        }

        function detect() {
            objectDetector.detect(document.getElementById('video'), (err, results) => {
                if (results && results.length > 0) {
                    // Agar samne koi "person" ya "chair" dikhe toh obstacle true
                    let found = results.some(r => r.label === 'person' || r.label === 'chair' || r.label === 'bottle');
                    isObstacle = found;
                    document.getElementById('status').innerText = found ? "Obstacle Detected! Stopping." : "Path Clear";
                } else {
                    isObstacle = false;
                }
                detect(); 
            });
        }

        // 4. Movement Logic
        function animate() {
            requestAnimationFrame(animate);

            if (moveForward && !isObstacle) car.translateZ(-0.1);
            if (moveBackward) car.translateZ(0.1);
            if (turnLeft) car.rotation.y += 0.05;
            if (turnRight) car.rotation.y -= 0.05;

            // Size Control from Slider
            let s = document.getElementById('sizeSlider').value;
            car.scale.set(s, s, s);

            renderer.render(scene, camera);
        }

        // 5. Input Listeners
        const setBtn = (id, action, val) => {
            document.getElementById(id).addEventListener('touchstart', () => window[action] = val);
            document.getElementById(id).addEventListener('touchend', () => window[action] = !val);
        };

        setBtn('btn-up', 'moveForward', true);
        setBtn('btn-down', 'moveBackward', true);
        setBtn('btn-left', 'turnLeft', true);
        setBtn('btn-right', 'turnRight', true);

        // Start Everything
        setupCamera().then(() => {
            init3D();
            startAI();
        });

        window.addEventListener('resize', () => {
            camera.aspect = window.innerWidth / window.innerHeight;
            camera.updateProjectionMatrix();
            renderer.setSize(window.innerWidth, window.innerHeight);
        });
    </script>
</body>
</html>
