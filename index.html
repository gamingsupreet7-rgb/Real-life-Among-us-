<!DOCTYPE html>
<html lang="hi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>Among Us: Tactical Ultra Fix</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-app.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-database.js"></script>
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css" rel="stylesheet">
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Orbitron:wght@900&family=Rajdhani:wght@700&display=swap');
        :root { --n-blue: #00f3ff; --n-red: #ff003c; }
        * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; outline: none; }
        body, html { margin: 0; padding: 0; width: 100%; height: 100%; background: #000; color: #fff; font-family: 'Rajdhani', sans-serif; overflow: hidden; position: fixed; }
        
        .glass { background: rgba(255, 255, 255, 0.05); backdrop-filter: blur(15px); border: 1px solid rgba(255, 255, 255, 0.1); border-radius: 20px; }
        
        /* Screen Transitions */
        .screen { position: absolute; inset: 0; display: none; padding: 20px; flex-direction: column; padding-top: env(safe-area-inset-top); background: #000; z-index: 10; }
        .screen.active { display: flex !important; }

        .btn-prime { background: linear-gradient(45deg, #0041ff, #00f3ff); border-radius: 12px; font-family: 'Orbitron'; font-weight: 900; color: white; text-transform: uppercase; }
        
        #map-view { flex-grow: 1; width: 100%; background: radial-gradient(circle, #0a111a 0%, #000 100%); border: 2px solid var(--n-blue); border-radius: 25px; position: relative; overflow: hidden; margin: 10px 0; }
        .p-dot { width: 14px; height: 14px; border-radius: 50%; position: absolute; transform: translate(-50%, -50%); border: 2px solid #fff; transition: all 0.8s ease-out; z-index: 10; }
        .body-marker { width: 22px; height: 22px; position: absolute; transform: translate(-50%, -50%); color: #ff0000; z-index: 5; font-size: 20px; text-shadow: 0 0 10px red; }

        /* Victory/Defeat Animation */
        @keyframes pulse-bg { 0% { background: #000; } 50% { background: #001a1a; } 100% { background: #000; } }
        .win-animate { animation: pulse-bg 2s infinite; }
        
        #meeting-overlay { position: fixed; inset: 0; background: rgba(0,0,0,0.98); z-index: 10000; display: none; flex-direction: column; align-items: center; justify-content: center; padding: 20px; }
        #game-result { position: fixed; inset: 0; z-index: 20000; display: none; flex-direction: column; align-items: center; justify-content: center; background: #000; font-family: 'Orbitron'; }
    </style>
</head>
<body>

    <div id="game-result">
        <h1 id="res-title" class="text-6xl mb-4 text-center tracking-tighter">VICTORY</h1>
        <p id="res-sub" class="text-xl text-cyan-400 uppercase tracking-[0.3em] text-center mb-10">Crewmates Won</p>
        <button onclick="location.reload()" class="px-12 py-5 bg-white text-black font-black rounded-2xl uppercase">Back to Base</button>
    </div>

    <div id="meeting-overlay">
        <h2 id="m-status" class="text-4xl font-black text-red-600 mb-2 font-['Orbitron']">MEETING</h2>
        <div id="m-timer" class="text-8xl font-['Orbitron'] mb-8 text-white">00</div>
        
        <div id="v-section" class="w-full max-w-sm hidden">
            <p class="text-center text-cyan-400 mb-6 uppercase font-bold tracking-widest">Voting Opens in: <span id="v-timer">20</span>s</p>
            <div id="v-list" class="grid grid-cols-2 gap-3"></div>
        </div>

        <div id="m-setup" class="w-full max-w-sm text-center">
            <p class="mb-4 text-gray-400 font-bold uppercase text-xs">Set Discussion Duration (Sec)</p>
            <input id="m-dur" type="number" value="30" class="w-full bg-white/10 p-5 rounded-2xl text-center mb-6 border border-white/20 text-3xl font-black text-cyan-400">
            <button id="confirm-meet-btn" class="w-full py-5 bg-cyan-600 rounded-2xl font-black uppercase">Start Timer</button>
        </div>
    </div>

    <div id="login-screen" class="screen active justify-center">
        <div class="text-center mb-16">
            <h1 class="text-6xl font-black italic tracking-tighter text-white">TACTICAL</h1>
            <h2 class="text-2xl text-[#00f3ff] font-['Orbitron'] tracking-[0.4em]">AMONG US</h2>
        </div>
        <div class="glass p-8 space-y-6">
            <input id="p-name" type="text" placeholder="ENTER AGENT NAME" class="w-full bg-black/60 p-6 rounded-2xl border border-white/10 text-center font-black uppercase tracking-widest text-cyan-400">
            <button id="init-btn" class="w-full btn-prime py-6 text-xl shadow-xl shadow-blue-900/40">Initialize System</button>
        </div>
    </div>

    <div id="mode-screen" class="screen justify-center space-y-8">
        <button id="host-mode-btn" class="glass p-12 text-center border-cyan-500/20 active:scale-95 transition-transform">
            <i class="fas fa-satellite-dish text-5xl mb-5 text-cyan-400"></i>
            <h3 class="text-2xl font-black uppercase">Create Mission</h3>
        </button>
        <div class="glass p-8 flex flex-col gap-5">
            <input id="join-code" type="text" placeholder="6-DIGIT CODE" class="bg-black/50 p-5 rounded-2xl text-center font-mono text-2xl border border-white/5 uppercase">
            <button id="join-sync-btn" class="w-full bg-green-600 py-6 rounded-2xl font-black uppercase tracking-widest">Join Frequency</button>
        </div>
    </div>

    <div id="host-setup" class="screen">
        <h2 class="text-2xl font-black text-cyan-400 mb-6 font-['Orbitron']">INTEL CONFIG</h2>
        <div class="glass p-5 space-y-4">
            <input id="t-name" type="text" placeholder="LOCATION NAME" class="w-full bg-black p-4 rounded-xl border border-white/10 font-bold uppercase">
            <input type="file" id="t-file" class="hidden" accept="image/*">
            <button id="upload-btn" class="w-full h-32 border-2 border-dashed border-white/20 rounded-2xl flex items-center justify-center bg-black/40 overflow-hidden">
                <img id="t-prev" class="hidden w-full h-full object-cover">
                <span id="t-hint" class="text-gray-500 font-black uppercase text-[10px]">Tap to Capture Photo</span>
            </button>
            <button id="save-task-btn" class="w-full py-4 bg-cyan-900/40 rounded-xl border border-cyan-500/50 font-black uppercase">Save Task</button>
        </div>
        <div id="t-list" class="flex gap-3 mt-6 overflow-x-auto pb-3"></div>
        <button id="create-lobby-btn" class="mt-auto btn-prime py-6 text-lg">Open Lobby</button>
    </div>

    <div id="lobby-screen" class="screen items-center justify-center">
        <p class="text-cyan-400 font-black uppercase tracking-[0.5em] text-[10px] mb-2">Sync Code</p>
        <h1 id="display-code" class="text-7xl font-black text-white mb-12 font-['Orbitron'] tracking-tighter">000000</h1>
        <div id="player-list" class="w-full glass p-8 min-h-[250px] mb-12 space-y-3"></div>
        <button id="start-mission-btn" class="hidden w-full bg-green-600 py-6 rounded-2xl font-black text-2xl uppercase shadow-2xl">Start Mission</button>
    </div>

    <div id="hud-screen" class="screen">
        <div class="flex justify-between items-center mb-4 px-1">
            <div class="flex flex-col">
                <h2 id="role-tag" class="text-3xl font-black italic tracking-tighter uppercase leading-none">AGENT</h2>
                <p id="gps-tag" class="text-[10px] text-cyan-500 font-mono font-bold mt-1 tracking-tighter">GPS: SEARCHING...</p>
            </div>
            <button id="emergency-btn" class="bg-orange-600/20 border-2 border-orange-500/50 text-orange-500 px-5 py-2 rounded-2xl text-[10px] font-black uppercase">Emergency</button>
        </div>
        
        <div id="map-view"><div id="map-dots"></div></div>

        <div class="glass p-2 h-24 mb-4 flex items-center overflow-hidden">
            <img id="hud-img" class="w-20 h-full object-cover rounded-lg border border-white/10 opacity-60">
            <div class="ml-4 flex flex-col justify-center">
                <p class="text-[9px] text-cyan-400 font-bold uppercase tracking-widest">Current Task</p>
                <h3 id="hud-task" class="text-lg font-black uppercase leading-tight">Syncing...</h3>
                <p id="ai-score" class="text-[9px] text-gray-500 font-bold"></p>
            </div>
        </div>

        <div class="space-y-4 pb-4">
            <video id="v-cam" class="hidden w-full h-44 bg-black rounded-3xl object-cover border-2 border-cyan-500/40 mb-3" autoplay playsinline></video>
            <div class="grid grid-cols-2 gap-4">
                <button id="do-task-btn" class="btn-prime py-8 text-xl" disabled>Do Task</button>
                <button id="report-btn" class="glass bg-red-600/10 border-red-500/30 text-red-500 py-8 font-black uppercase text-sm opacity-30">Report</button>
            </div>
        </div>
    </div>

<script>
    // --- FIREBASE INIT ---
    const firebaseConfig = {
        apiKey: "AIzaSyDbR67XE2iBcqQUkrDjjr7LQtLUNpyUdB8",
        databaseURL: "https://rl-amongus-real-life-amo-5542a-default-rtdb.firebaseio.com",
        projectId: "rl-amongus-real-life-amo-5542a",
        appId: "1:811874974870:web:db729403e3c241c1d76b7"
    };
    firebase.initializeApp(firebaseConfig);
    const db = firebase.database();

    let state = { 
        id: 'p_' + Math.random().toString(36).substr(2,4), code:'', 
        name:'', tasks:[], cur:0, players:{}, lat:0, lon:0, origin:{la:0, lo:0}, 
        role:'Crewmate', status:'alive', meets:1, voted: false
    };

    // --- SCREEN NAVIGATION FIX ---
    function showScreen(screenId) {
        document.querySelectorAll('.screen').forEach(s => s.classList.remove('active'));
        const target = document.getElementById(screenId);
        if(target) target.classList.add('active');
        else console.error("Screen not found:", screenId);
    }

    // --- BUTTON EVENT LISTENERS (MORE STABLE) ---
    document.getElementById('init-btn').addEventListener('click', () => {
        const name = document.getElementById('p-name').value.trim();
        if(name.length < 2) return alert("Enter Agent Name!");
        state.name = name.toUpperCase();
        showScreen('mode-screen');
    });

    document.getElementById('host-mode-btn').addEventListener('click', () => showScreen('host-setup'));
    document.getElementById('join-sync-btn').addEventListener('click', joinGame);
    document.getElementById('upload-btn').addEventListener('click', () => document.getElementById('t-file').click());
    document.getElementById('save-task-btn').addEventListener('click', addTask);
    document.getElementById('create-lobby-btn').addEventListener('click', createLobby);
    document.getElementById('start-mission-btn').addEventListener('click', startGame);
    document.getElementById('emergency-btn').addEventListener('click', callMeet);
    document.getElementById('confirm-meet-btn').addEventListener('click', startMeet);
    document.getElementById('report-btn').addEventListener('click', reportBody);
    document.getElementById('do-task-btn').addEventListener('click', handleTask);

    // --- PHOTO AI ENGINE ---
    async function getHash(src) {
        return new Promise(res => {
            const img = new Image(); img.src = src; img.onload = () => {
                const cvs = document.createElement('canvas'); const ctx = cvs.getContext('2d');
                cvs.width = 12; cvs.height = 12; ctx.drawImage(img, 0, 0, 12, 12);
                const d = ctx.getImageData(0,0,12,12).data;
                let h = ""; for(let i=0; i<d.length; i+=4) h += ((d[i]+d[i+1]+d[i+2])/3 > 125 ? "1" : "0");
                res(h);
            }
        });
    }

    document.getElementById('t-file').onchange = (e) => {
        const r = new FileReader(); r.onload = async ev => {
            document.getElementById('t-prev').src = ev.target.result;
            document.getElementById('t-prev').classList.remove('hidden');
            document.getElementById('t-hint').classList.add('hidden');
            state.tempHash = await getHash(ev.target.result);
        }; r.readAsDataURL(e.target.files[0]);
    };

    function addTask() {
        const n = document.getElementById('t-name').value;
        const i = document.getElementById('t-prev').src;
        if(!n || !state.tempHash) return;
        state.tasks.push({ name: n, img: i, hash: state.tempHash });
        document.getElementById('t-list').innerHTML += `<img src="${i}" class="w-14 h-14 object-cover rounded-xl border-2 border-cyan-500 shadow-lg">`;
        document.getElementById('t-name').value = ''; 
        document.getElementById('t-prev').classList.add('hidden');
        document.getElementById('t-hint').classList.remove('hidden');
    }

    // --- LOBBY & GAME LOGIC ---
    async function createLobby() {
        state.code = Math.floor(100000 + Math.random()*900000).toString();
        await db.ref('rooms/'+state.code).set({
            status: 'lobby', tasks: state.tasks,
            players: { [state.id]: { name: state.name, role: 'Crewmate', status: 'alive', lat:0, lon:0, id: state.id } }
        });
        showScreen('lobby-screen'); 
        document.getElementById('display-code').innerText = state.code;
        document.getElementById('start-mission-btn').classList.remove('hidden');
        sync();
    }

    function joinGame() {
        state.code = document.getElementById('join-code').value;
        if(!state.code || state.code.length < 5) return;
        db.ref(`rooms/${state.code}/players/${state.id}`).set({ name: state.name, role: 'Crewmate', status: 'alive', lat:0, lon:0, id: state.id });
        showScreen('lobby-screen'); 
        document.getElementById('display-code').innerText = state.code;
        sync();
    }

    function startGame() { 
        const pids = Object.keys(state.players);
        const impId = pids[Math.floor(Math.random()*pids.length)];
        pids.forEach(id => db.ref(`rooms/${state.code}/players/${id}`).update({ role: (id===impId?'Impostor':'Crewmate') }));
        db.ref(`rooms/${state.code}`).update({ status: 'playing' }); 
    }

    function sync() {
        db.ref(`rooms/${state.code}/players`).on('value', snap => {
            state.players = snap.val() || {};
            document.getElementById('player-list').innerHTML = Object.values(state.players).map(p => 
                `<div class="p-4 bg-white/5 border-l-4 border-cyan-500 font-black uppercase text-xs flex justify-between">
                    <span>${p.name}</span> <span class="text-cyan-400 opacity-40">READY</span>
                </div>`).join('');
            
            if(state.players[state.id]) {
                state.role = state.players[state.id].role;
                state.status = state.players[state.id].status;
                const rTag = document.getElementById('role-tag');
                rTag.innerText = state.role;
                rTag.style.color = state.role === 'Impostor' ? '#ff003c' : '#00f3ff';
            }
            renderMap();
            checkWinCondition();
        });

        db.ref(`rooms/${state.code}/status`).on('value', s => { if(s.val()==='playing') { showScreen('hud-screen'); initGPS(); updateHUD(); } });
        db.ref(`rooms/${state.code}/meeting`).on('value', snap => {
            const m = snap.val();
            if(!m || !m.active) { document.getElementById('meeting-overlay').style.display='none'; return; }
            handleMeeting(m);
        });
    }

    // --- HUD & GPS ---
    function initGPS() {
        navigator.geolocation.watchPosition(p => {
            if(state.origin.la === 0) { state.origin.la = p.coords.latitude; state.origin.lo = p.coords.longitude; }
            const delta = getDist(state.lat || p.coords.latitude, state.lon || p.coords.longitude, p.coords.latitude, p.coords.longitude);
            if(delta > 1.4 || state.lat === 0) { state.lat = p.coords.latitude; state.lon = p.coords.longitude; }
            const dist = getDist(state.origin.la, state.origin.lo, state.lat, state.lon);
            document.getElementById('gps-tag').innerText = `SAT_LINK: STABLE | MOVED: ${dist.toFixed(1)}M`;
            document.getElementById('do-task-btn').disabled = (dist < 5);
            db.ref(`rooms/${state.code}/players/${state.id}`).update({ lat: state.lat, lon: state.lon });
            checkBodies();
        }, null, { enableHighAccuracy: true });
    }

    function renderMap() {
        const m = document.getElementById('map-dots'); m.innerHTML = '';
        for(let id in state.players) {
            const p = state.players[id];
            if(p.status === 'dead') {
                m.innerHTML += `<div class="body-marker" style="left:${50+(p.lon-state.origin.lo)*8000000}%; top:${50+(p.lat-state.origin.la)*8000000}%"><i class="fas fa-skull"></i></div>`;
                continue;
            }
            const dot = document.createElement('div');
            dot.className = 'p-dot';
            dot.style.left = 50 + (p.lon - state.origin.lo) * 8000000 + '%';
            dot.style.top = 50 + (p.lat - state.origin.la) * 8000000 + '%';
            dot.style.color = (id === state.id) ? '#00f3ff' : (state.role==='Impostor'?'#ff003c':'#fff');
            dot.style.background = dot.style.color;
            m.appendChild(dot);
        }
    }

    async function handleTask() {
        const b = document.getElementById('do-task-btn'); const v = document.getElementById('v-cam');
        if(b.innerText === "DO TASK") {
            const s = await navigator.mediaDevices.getUserMedia({ video: { facingMode: 'environment' } });
            v.srcObject = s; v.classList.remove('hidden'); b.innerText = "VERIFY PHOTO";
        } else {
            const cvs = document.createElement('canvas'); cvs.width = 100; cvs.height = 100;
            cvs.getContext('2d').drawImage(v, 0, 0, 100, 100);
            const crewH = await getHash(cvs.toDataURL());
            const targetH = state.tasks[state.cur]?.hash || "";
            let diff = 0; for(let i=0; i<144; i++) if(crewH[i] !== targetH[i]) diff++;
            const match = Math.round((1 - diff/144) * 100);
            document.getElementById('ai-score').innerText = `MATCH: ${match}%`;
            if(match > 50) {
                v.srcObject.getTracks().forEach(t => t.stop()); v.classList.add('hidden');
                state.cur++; state.origin = { la: state.lat, lo: state.lon }; 
                b.innerText = "DO TASK"; b.disabled = true; updateHUD(); alert("TASK SUCCESS!");
            } else { alert("AI REJECTED! Try again."); b.innerText = "DO TASK"; }
        }
    }

    function updateHUD() {
        const t = state.tasks[state.cur];
        if(t) { document.getElementById('hud-task').innerText = t.name; document.getElementById('hud-img').src = t.img; }
        else { document.getElementById('hud-task').innerText = "ALL MISSIONS CLEAR"; }
    }

    // --- MEETING & VOTING ---
    function callMeet() { if(state.meets > 0 && state.status==='alive') { document.getElementById('meeting-overlay').style.display='flex'; document.getElementById('m-setup').style.display='block'; } }
    function startMeet() {
        const t = document.getElementById('m-dur').value || 30;
        db.ref(`rooms/${state.code}/meeting`).set({ active: true, caller: state.id, timer: t, phase: 'discussion', startTime: Date.now() });
        state.meets--; document.getElementById('emergency-btn').innerText = `MEET (0)`;
        document.getElementById('m-setup').style.display='none';
    }

    function handleMeeting(m) {
        document.getElementById('meeting-overlay').style.display='flex';
        const elapsed = Math.flo
