<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>AI RC Monster v3</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
    <script src="https://unpkg.com/ml5@latest/dist/ml5.min.js"></script>
    <style>
        body { margin: 0; overflow: hidden; background: #000; font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; }
        canvas { display: block; z-index: 1; }
        #video { position: fixed; top: 0; left: 0; width: 100%; height: 100%; object-fit: cover; z-index: -1; }
        
        /* AI HUD */
        #hud { position: fixed; top: 20px; left: 20px; color: #0f0; background: rgba(0,0,0,0.7); padding: 15px; border-radius: 10px; border: 1px solid #0f0; z-index: 10; font-family: monospace; }
        .alert { color: #f00; font-weight: bold; animation: blink 0.5s infinite; }
        @keyframes blink { 50% { opacity: 0; } }

        /* Controls */
        .controls { position: fixed; bottom: 30px; width: 100%; display: flex; justify-content: space-around; align-items: flex-end; z-index: 20; pointer-events: none; }
        .btn-circle { width: 80px; height: 80px; background: rgba(255,255,255,0.2); border: 2px solid #fff; border-radius: 50%; color: #fff; display: flex; justify-content: center; align-items: center; pointer-events: auto; font-weight: bold; -webkit-user-select: none; }
        .btn-rect { width: 100px; height: 60px; background: rgba(255,255,255,0.2); border: 2px solid #fff; border-radius: 10px; color: #fff; display: flex; justify-content: center; align-items: center; pointer-events: auto; font-weight: bold; }
        .active { background: rgba(255, 255, 255, 0.5); transform: scale(0.9); }

        #size-slider { position: fixed; right: 20px; top: 50%; transform: translateY(-50%); height: 200px; writing-mode: bt-lr; appearance: slider-vertical; z-index: 20; }
    </style>
</head>
<body>

    <video id="video" autoplay playsinline></video>
    
    <div id="hud">
        [ SYSTEM ONLINE ]<br>
        AI SENSOR: <span id="ai-stat">SCANNING...</span><br>
        OBJECT: <span id="obj-stat">NONE</span><br>
        PHYSICS: <span id="speed-stat">0 km/h</span>
    </div>

    <input type="range" id="size-slider" min="0.1" max="3" step="0.1" value="1">

    <div class="controls">
        <div style="display: flex; gap: 10px;">
            <div id="left" class="btn-circle">L</div>
            <div id="right" class="btn-circle">R</div>
        </div>
        <div style="display: flex; flex-direction: column; gap: 10px;">
            <div id="gas" class="btn-rect" style="background: rgba(0,255,0,0.2);">GAS</div>
            <div id="brake" class="btn-rect" style="background: rgba(255,0,0,0.2);">BRAKE</div>
            <div id="rev" class="btn-rect" style="background: rgba(255,165,0,0.2);">REV</div>
        </div>
    </div>

    <script>
        let scene, camera, renderer, car, objectDetector;
        let speed = 0, angle = 0;
        let isGas = false, isRev = false, isBrake = false, isLeft = false, isRight = false;
        let aiBlocked = false;

        // 1. Camera Setup
        async function initCamera() {
            const stream = await navigator.mediaDevices.getUserMedia({ video: { facingMode: 'environment' } });
            document.getElementById('video').srcObject = stream;
        }

        // 2. Custom Car Design (Bina External Link Ke)
        function createCar() {
            const carGroup = new THREE.Group();
            
            // Body
            const body = new THREE.Mesh(
                new THREE.BoxGeometry(2, 0.5, 4),
                new THREE.MeshPhongMaterial({ color: 0xff0000 })
            );
            carGroup.add(body);

            // Cockpit
            const cabin = new THREE.Mesh(
                new THREE.BoxGeometry(1.5, 0.6, 1.5),
                new THREE.MeshPhongMaterial({ color: 0x333333, transparent: true, opacity: 0.8 })
            );
            cabin.position.y = 0.5;
            cabin.position.z = -0.2;
            carGroup.add(cabin);

            // Wheels
            const wheelGeo = new THREE.CylinderGeometry(0.4, 0.4, 0.3, 16);
            const wheelMat = new THREE.MeshPhongMaterial({ color: 0x111111 });
            
            const positions = [[-1, -0.2, 1.2], [1, -0.2, 1.2], [-1, -0.2, -1.2], [1, -0.2, -1.2]];
            positions.forEach(pos => {
                const wheel = new THREE.Mesh(wheelGeo, wheelMat);
                wheel.rotation.z = Math.PI/2;
                wheel.position.set(...pos);
                carGroup.add(wheel);
            });

            return carGroup;
        }

        // 3. Scene Init
        function initScene() {
            scene = new THREE.Scene();
            camera = new THREE.PerspectiveCamera(75, window.innerWidth/window.innerHeight, 0.1, 1000);
            renderer = new THREE.WebGLRenderer({ alpha: true, antialias: true });
            renderer.setSize(window.innerWidth, window.innerHeight);
            document.body.appendChild(renderer.domElement);

            const light = new THREE.DirectionalLight(0xffffff, 1);
            light.position.set(5, 10, 5);
            scene.add(light);
            scene.add(new THREE.AmbientLight(0xffffff, 0.5));

            car = createCar();
            car.position.set(0, -3, -10);
            scene.add(car);

            camera.position.z = 5;
            animate();
        }

        // 4. AI Logic (The Core)
        function initAI() {
            objectDetector = ml5.objectDetector('cocossd', {}, () => {
                document.getElementById('ai-stat').innerText = "AI ACTIVE";
                detect();
            });
        }

        function detect() {
            objectDetector.detect(document.getElementById('video'), (err, results) => {
                if (results && results.length > 0) {
                    // AI Check: Agar samne koi cheez 40% se zyada screen cover kare ya koi 'person' ho
                    let danger = results.some(r => r.confidence > 0.5 && (r.label === 'person' || r.label === 'chair' || r.label === 'bottle' || r.label === 'cell phone'));
                    
                    if (danger) {
                        aiBlocked = true;
                        document.getElementById('ai-stat').innerHTML = "<span class='alert'>STOP! OBSTACLE</span>";
                        document.getElementById('obj-stat').innerText = results[0].label.toUpperCase();
                    } else {
                        aiBlocked = false;
                        document.getElementById('ai-stat').innerText = "PATH CLEAR";
                        document.getElementById('obj-stat').innerText = "NONE";
                    }
                }
                detect();
            });
        }

        // 5. Physics & Animation
        function animate() {
            requestAnimationFrame(animate);

            // Scale Control
            let s = document.getElementById('size-slider').value;
            car.scale.set(s, s, s);

            // Driving Logic
            if (isGas && !aiBlocked) speed = Math.min(speed + 0.005, 0.2);
            else if (isRev) speed = Math.max(speed - 0.005, -0.1);
            else if (isBrake) speed *= 0.8;
            else speed *= 0.95; // Friction

            if (Math.abs(speed) > 0.01) {
                if (isLeft) car.rotation.y += 0.04;
                if (isRight) car.rotation.y -= 0.04;
            }

            car.translateZ(-speed);
            document.getElementById('speed-stat').innerText = Math.round(Math.abs(speed)*500) + " km/h";

            renderer.render(scene, camera);
        }

        // 6. Touch Inputs
        const bind = (id, action) => {
            const el = document.getElementById(id);
            el.ontouchstart = (e) => { e.preventDefault(); window[action] = true; el.classList.add('active'); };
            el.ontouchend = (e) => { e.preventDefault(); window[action] = false; el.classList.remove('active'); };
        };

        bind('gas', 'isGas'); bind('rev', 'isRev'); bind('brake', 'isBrake');
        bind('left', 'isLeft'); bind('right', 'isRight');

        initCamera();
        initScene();
        initAI();

        window.onresize = () => {
            camera.aspect = window.innerWidth / window.innerHeight;
            camera.updateProjectionMatrix();
            renderer.setSize(window.innerWidth, window.innerHeight);
        };
    </script>
</body>
</html>
