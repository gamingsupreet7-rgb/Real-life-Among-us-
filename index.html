<!DOCTYPE html>
<html lang="hi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Among Us House PRO + MAP</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-app.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-database.js"></script>
    <style>
        body { background: #000; color: #fff; font-family: sans-serif; overflow: hidden; }
        #map-container { width: 100%; height: 200px; background: #111; border: 2px solid #333; position: relative; border-radius: 15px; margin-top: 10px; overflow: hidden; }
        .player-dot { width: 10px; height: 10px; border-radius: 50%; position: absolute; transition: all 0.5s ease; border: 1px solid white; }
        .room-label { position: absolute; font-size: 8px; color: #444; text-transform: uppercase; font-weight: bold; }
        .dead-screen { position: fixed; inset: 0; background: #700; z-index: 9999; display: flex; flex-direction: column; align-items: center; justify-content: center; animation: flash 0.3s infinite; }
        @keyframes flash { 0% { opacity: 1; } 50% { opacity: 0.7; } 100% { opacity: 1; } }
    </style>
</head>
<body class="p-4">

    <div id="app" class="max-w-md mx-auto">
        <div id="lobby" class="space-y-4 pt-6">
            <h1 class="text-4xl font-black text-center text-red-600">HOUSE MAP PRO</h1>
            <input id="nick" type="text" placeholder="YOUR NAME" class="w-full p-4 bg-gray-900 rounded-xl border border-gray-700 uppercase font-bold">
            <textarea id="tasks" placeholder="Task 1&#10;Task 2" class="w-full p-3 bg-gray-900 rounded-xl h-24 text-sm"></textarea>
            <button onclick="joinMatch('host')" class="w-full py-4 bg-red-700 rounded-xl font-bold shadow-lg">HOST GAME</button>
            <div class="flex gap-2">
                <input id="roomCode" type="text" placeholder="CODE" class="w-full p-4 bg-gray-900 rounded-xl text-center">
                <button onclick="joinMatch('join')" class="px-6 bg-green-700 rounded-xl font-bold">JOIN</button>
            </div>
        </div>

        <div id="game" class="hidden space-y-3">
            <div class="flex justify-between items-center bg-gray-900 p-3 rounded-xl border-b-2 border-red-600">
                <span id="role" class="font-black italic text-lg">CREWMATE</span>
                <button onclick="toggleGallery()" class="bg-blue-600 px-3 py-1 rounded-lg text-[10px] font-bold">VIEW GALLERY</button>
            </div>

            <div id="map-container">
                <div class="room-label" style="top:10%; left:10%;">Kitchen</div>
                <div class="room-label" style="top:10%; right:10%;">Balcony</div>
                <div class="room-label" style="bottom:10%; left:10%;">Bedroom</div>
                <div class="room-label" style="bottom:10%; right:10%;">Hall</div>
                <div id="map-players"></div>
            </div>

            <div id="task-list" class="max-h-32 overflow-y-auto space-y-1 text-xs text-gray-400 p-2 bg-gray-900 rounded-lg"></div>

            <div class="fixed bottom-6 left-4 right-4 space-y-3">
                <video id="v-preview" class="hidden w-full h-32 bg-black rounded-lg object-cover border border-white" autoplay playsinline></video>
                <div class="grid grid-cols-2 gap-4">
                    <button id="task-btn" onclick="handleTask()" class="py-10 bg-blue-700 rounded-2xl font-black shadow-2xl">DO TASK</button>
                    <button onclick="alert('Emergency Meeting!')" class="py-10 bg-orange-700 rounded-2xl font-black text-xs uppercase">Report</button>
                </div>
                <button id="kill-btn" onclick="doKill()" class="hidden w-full py-5 bg-red-800 rounded-2xl font-black text-xl border-2 border-red-500">KILL (InRange)</button>
            </div>
        </div>

        <div id="gallery" class="hidden fixed inset-0 bg-black z-[2000] p-4 overflow-y-auto">
            <div class="flex justify-between items-center mb-4"><h2 class="text-xl font-bold">EVIDENCE</h2><button onclick="toggleGallery()" class="text-3xl">&times;</button></div>
            <div id="gallery-content" class="grid grid-cols-2 gap-2"></div>
        </div>

        <div id="dead" class="hidden dead-screen">
            <h1 class="text-5xl font-black">KILLED!</h1>
            <p class="mt-4">You are now a GHOST.</p>
        </div>
    </div>

<script>
    const firebaseConfig = {
        apiKey: "AIzaSyDbR67XE2iBcqQUkrDjjr7LQtLUNpyUdB8",
        databaseURL: "https://rl-amongus-real-life-amo-5542a-default-rtdb.firebaseio.com",
        projectId: "rl-amongus-real-life-amo-5542a",
        appId: "1:811874974870:web:db729403e3c241c1d76b7"
    };
    firebase.initializeApp(firebaseConfig);
    const db = firebase.database();

    let state = { id: Math.random().toString(36).substr(2,9), code: '', role: 'Crewmate', lat:0, lon:0, tasks:[], origin:{la:0, lo:0} };

    async function joinMatch(type) {
        const name = document.getElementById('nick').value;
        if(!name) return alert("Naam likho!");
        if(type==='host') {
            state.code = Math.floor(100000 + Math.random()*900000).toString();
            const tList = document.getElementById('tasks').value.split('\n').filter(x=>x.trim()!="");
            await db.ref('rooms/'+state.code).set({ tasks: tList, players: { [state.id]: { name, role:'Crewmate', status:'alive', lat:0, lon:0 } } });
        } else {
            state.code = document.getElementById('roomCode').value;
            await db.ref(`rooms/${state.code}/players/${state.id}`).set({ name, role:'Crewmate', status:'alive', lat:0, lon:0 });
        }
        setupGame();
    }

    function setupGame() {
        document.getElementById('lobby').classList.add('hidden');
        document.getElementById('game').classList.remove('hidden');

        navigator.geolocation.watchPosition(p => {
            if(state.origin.la === 0) { state.origin.la = p.coords.latitude; state.origin.lo = p.coords.longitude; }
            state.lat = p.coords.latitude; state.lon = p.coords.longitude;
            db.ref(`rooms/${state.code}/players/${state.id}`).update({ lat: state.lat, lon: state.lon });
        }, null, {enableHighAccuracy:true});

        db.ref(`rooms/${state.code}/players`).on('value', snap => {
            const players = snap.val();
            const mapDiv = document.getElementById('map-players');
            mapDiv.innerHTML = '';
            
            for(let id in players) {
                const p = players[id];
                if(id === state.id) {
                    if(p.role === 'Impostor') { 
                        document.getElementById('role').innerText = "IMPOSTOR"; 
                        document.getElementById('role').style.color = "red";
                        document.getElementById('kill-btn').classList.remove('hidden');
                    }
                    if(p.status === 'dead') document.getElementById('dead').classList.remove('hidden');
                }
                
                // Map Logic (Scaling GPS to 200px box)
                const x = 100 + (p.lon - state.origin.lo) * 1000000;
                const y = 100 + (p.lat - state.origin.la) * 1000000;
                const dot = document.createElement('div');
                dot.className = 'player-dot';
                dot.style.left = Math.max(0, Math.min(190, x)) + 'px';
                dot.style.top = Math.max(0, Math.min(190, y)) + 'px';
                dot.style.background = (id === state.id) ? 'red' : 'blue';
                mapDiv.appendChild(dot);
            }
            checkKill(players);
        });

        db.ref(`rooms/${state.code}/tasks`).once('value', s => {
            state.tasks = (s.val() || []).map(t => ({text:t, done:false}));
            renderTasks();
        });
    }

    function renderTasks() {
        document.getElementById('task-list').innerHTML = state.tasks.map(t => `<div>${t.done ? '✅' : '🔴'} ${t.text}</div>`).join('');
    }

    async function handleTask() {
        const btn = document.getElementById('task-btn');
        const video = document.getElementById('v-preview');
        if(btn.innerText === "DO TASK") {
            const stream = await navigator.mediaDevices.getUserMedia({video:{facingMode:'environment'}});
            video.srcObject = stream; video.classList.remove('hidden');
            btn.innerText = "TAKE PHOTO";
        } else {
            const canvas = document.createElement('canvas');
            canvas.width = video.videoWidth; canvas.height = video.videoHeight;
            canvas.getContext('2d').drawImage(video, 0, 0);
            db.ref(`rooms/${state.code}/gallery`).push({ img: canvas.toDataURL('image/jpeg', 0.5), user: document.getElementById('nick').value });
            video.srcObject.getTracks().forEach(t => t.stop());
            video.classList.add('hidden');
            btn.innerText = "DO TASK";
            const tIdx = state.tasks.findIndex(x => !x.done);
            if(tIdx !== -1) state.tasks[tIdx].done = true;
            renderTasks();
            alert("Task Proof Saved!");
        }
    }

    function checkKill(players) {
        if(document.getElementById('role').innerText !== "IMPOSTOR") return;
        let target = null;
        for(let id in players) {
            if(id !== state.id && players[id].status === 'alive') {
                const d = Math.sqrt(Math.pow(players[id].lat - state.lat, 2) + Math.pow(players[id].lon - state.lon, 2));
                if(d < 0.0001) target = id; // Roughly 5-10 meters
            }
        }
        state.target = target;
        document.getElementById('kill-btn').style.opacity = target ? "1" : "0.3";
    }

    function doKill() {
        if(state.target) db.ref(`rooms/${state.code}/players/${state.target}`).update({ status: 'dead' });
    }

    function toggleGallery() {
        const g = document.getElementById('gallery');
        g.classList.toggle('hidden');
        if(!g.classList.contains('hidden')) {
            db.ref(`rooms/${state.code}/gallery`).once('value', s => {
                let html = '';
                s.forEach(c => { html += `<div class="bg-gray-800 p-1 rounded"><img src="${c.val().img}" class="w-full h-24 object-cover"><p class="text-[8px] text-center">${c.val().user}</p></div>`; });
                document.getElementById('gallery-content').innerHTML = html;
            });
        }
    }
</script>
</body>
    </html>
