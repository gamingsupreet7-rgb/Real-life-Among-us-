<!DOCTYPE html>
<html lang="hi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Tactical Among Us - Final Pro</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-app.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-database.js"></script>
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css" rel="stylesheet">
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Orbitron:wght@900&family=Rajdhani:wght@700&display=swap');
        :root { --neon-blue: #00f3ff; --neon-red: #ff003c; }
        body { background: #010103; color: #fff; font-family: 'Rajdhani', sans-serif; overflow: hidden; height: 100vh; }
        .premium-card { background: rgba(255,255,255,0.05); backdrop-filter: blur(12px); border: 1px solid rgba(255,255,255,0.1); border-radius: 20px; }
        .screen { display: none; height: 100vh; padding: 20px; flex-direction: column; }
        .screen.active { display: flex; }
        .exit-btn { position: fixed; top: 20px; right: 20px; z-index: 5000; width: 40px; height: 40px; border-radius: 10px; background: rgba(255,0,0,0.2); border: 1px solid rgba(255,0,0,0.5); display: flex; align-items: center; justify-content: center; }
        #exit-confirm { position: fixed; inset: 0; background: rgba(0,0,0,0.9); z-index: 6000; display: none; align-items: center; justify-content: center; padding: 20px; }
        #map-view { flex-grow: 1; background: radial-gradient(circle, #0a0a1a 0%, #000 100%); border: 2px solid var(--neon-blue); border-radius: 25px; position: relative; overflow: hidden; margin: 10px 0; }
        .p-dot { width: 14px; height: 14px; border-radius: 50%; position: absolute; transform: translate(-50%, -50%); border: 2px solid #fff; box-shadow: 0 0 10px currentColor; transition: all 0.5s ease-out; }
    </style>
</head>
<body>

    <div id="exit-confirm">
        <div class="premium-card p-8 w-full max-w-sm text-center">
            <h2 class="text-2xl font-black neon-text-red mb-6 font-['Orbitron']">ABORT MISSION?</h2>
            <div class="flex gap-4">
                <button onclick="toggleExit(false)" class="flex-1 py-3 bg-gray-800 rounded-xl font-bold">CANCEL</button>
                <button onclick="location.reload()" class="flex-1 py-3 bg-red-700 rounded-xl font-bold">CONFIRM</button>
            </div>
        </div>
    </div>

    <button class="exit-btn" onclick="toggleExit(true)"><i class="fas fa-times text-red-500"></i></button>

    <div id="home" class="screen active justify-center text-center">
        <h1 class="text-5-xl font-black mb-10 italic">TACTICAL <span class="text-[#00f3ff] block font-['Orbitron']">AMONG US</span></h1>
        <div class="premium-card p-6 space-y-4">
            <input id="p-name" type="text" placeholder="AGENT IDENTITY" class="w-full bg-black p-4 rounded-xl border border-white/20 text-center uppercase font-bold outline-none focus:border-[#00f3ff]">
            <button onclick="showScreen('host-setup')" class="w-full bg-gradient-to-r from-blue-700 to-cyan-500 py-5 rounded-xl font-['Orbitron'] font-black">HOST COMMAND</button>
            <div class="flex gap-2">
                <input id="r-code" type="text" placeholder="6-DIGIT" class="w-full bg-black p-4 rounded-xl text-center font-mono">
                <button onclick="joinGame()" class="px-6 bg-green-700 rounded-xl font-bold uppercase">Join</button>
            </div>
        </div>
    </div>

    <div id="host-setup" class="screen">
        <h2 class="text-2xl font-bold mb-4 font-['Orbitron'] text-[#00f3ff]">MISSION INTEL</h2>
        <div class="premium-card p-4 space-y-3">
            <input id="t-name" type="text" placeholder="TASK NAME" class="w-full bg-black p-3 rounded-lg border border-white/10 outline-none">
            <input type="file" id="t-file" class="hidden" accept="image/*" onchange="previewTask(this)">
            <button onclick="document.getElementById('t-file').click()" class="w-full py-6 border-2 border-dashed border-white/20 rounded-xl text-gray-400 font-bold uppercase text-xs">Capture Target Photo</button>
            <img id="t-preview" class="hidden w-full h-32 object-cover rounded-xl mt-2 border border-cyan-500/50">
            <button onclick="addTask()" class="w-full py-3 bg-cyan-900/40 rounded-lg font-bold border border-cyan-500">ADD TO MISSION</button>
        </div>
        <div id="t-stack" class="grid grid-cols-4 gap-2 mt-4"></div>
        <button onclick="startLobby()" class="mt-auto bg-gradient-to-r from-blue-700 to-cyan-500 py-5 rounded-xl font-['Orbitron'] font-black">ESTABLISH LINK</button>
    </div>

    <div id="hud" class="screen">
        <div class="flex justify-between items-start mb-4">
            <div class="text-left">
                <h2 id="role-tag" class="text-2xl font-black italic tracking-tighter">CREWMATE</h2>
                <p id="gps-tag" class="text-[10px] text-cyan-400 font-mono">GPS: LOCKING...</p>
            </div>
        </div>

        <div class="premium-card p-1 mb-4 relative overflow-hidden group">
            <img id="hud-img" class="w-full h-40 object-cover rounded-xl opacity-50">
            <div class="absolute bottom-4 left-4">
                <p class="text-[10px] text-cyan-400 uppercase tracking-widest">Active Intel</p>
                <h3 id="hud-task" class="text-xl font-bold uppercase">Wait for Link...</h3>
            </div>
        </div>

        <div id="map-view">
            <div id="map-dots"></div>
            <div class="absolute inset-0 pointer-events-none opacity-20" style="background-image: radial-gradient(#fff 1px, transparent 1px); background-size: 20px 20px;"></div>
        </div>

        <div class="mt-auto space-y-4 pb-4">
            <video id="v-cam" class="hidden w-full h-40 bg-black rounded-3xl object-cover border border-cyan-500" autoplay playsinline></video>
            <div class="grid grid-cols-2 gap-4">
                <button id="task-btn" onclick="handleTask()" class="bg-gradient-to-r from-blue-700 to-cyan-500 py-10 rounded-3xl font-['Orbitron'] font-black text-xl shadow-xl disabled:opacity-30" disabled>DO TASK</button>
                <button onclick="alert('Emergency Meeting Called!')" class="premium-card bg-orange-600/20 py-10 font-black border-orange-500/50">REPORT</button>
            </div>
        </div>
    </div>

<script>
    const firebaseConfig = {
        apiKey: "AIzaSyDbR67XE2iBcqQUkrDjjr7LQtLUNpyUdB8",
        databaseURL: "https://rl-amongus-real-life-amo-5542a-default-rtdb.firebaseio.com",
        projectId: "rl-amongus-real-life-amo-5542a",
        appId: "1:811874974870:web:db729403e3c241c1d76b7"
    };
    firebase.initializeApp(firebaseConfig);
    const db = firebase.database();

    let state = { 
        id: Math.random().toString(36).substr(2,9), 
        tasks:[], cur:0, players:{}, lat:0, lon:0, 
        origin:{la:0, lo:0}, // Ye map ka center banega
        hostPhotoColor: null 
    };

    function showScreen(id) {
        document.querySelectorAll('.screen').forEach(s => s.classList.remove('active'));
        document.getElementById(id).classList.add('active');
    }

    function toggleExit(show) {
        document.getElementById('exit-confirm').style.display = show ? 'flex' : 'none';
    }

    // --- PHOTO AI LOGIC ---
    function analyzeImage(imgSrc) {
        return new Promise(res => {
            const img = new Image();
            img.src = imgSrc;
            img.onload = () => {
                const canvas = document.createElement('canvas');
                const ctx = canvas.getContext('2d');
                canvas.width = 50; canvas.height = 50;
                ctx.drawImage(img, 0, 0, 50, 50);
                const data = ctx.getImageData(0,0,50,50).data;
                let r=0, g=0, b=0;
                for(let i=0; i<data.length; i+=4) { r+=data[i]; g+=data[i+1]; b+=data[i+2]; }
                res({ r: r/(data.length/4), g: g/(data.length/4), b: b/(data.length/4) });
            }
        });
    }

    function previewTask(i) {
        const r = new FileReader(); r.onload = async e => { 
            const p = document.getElementById('t-preview'); p.src = e.target.result; p.classList.remove('hidden'); 
            state.tempColor = await analyzeImage(e.target.result);
        }; r.readAsDataURL(i.files[0]);
    }

    function addTask() {
        const n = document.getElementById('t-name').value;
        const i = document.getElementById('t-preview').src;
        if(!n || i.includes('hidden')) return;
        state.tasks.push({name:n, img:i, color: state.tempColor});
        document.getElementById('t-stack').innerHTML += `<img src="${i}" class="w-12 h-12 object-cover rounded border border-cyan-500">`;
        document.getElementById('t-name').value = ''; document.getElementById('t-preview').classList.add('hidden');
    }

    // --- GPS & MAP LOGIC ---
    function initHUD() {
        showScreen('hud');
        navigator.geolocation.watchPosition(p => {
            // First time location ko origin (0,0) set kar do
            if(state.origin.la === 0) { 
                state.origin.la = p.coords.latitude; 
                state.origin.lo = p.coords.longitude; 
            }
            state.lat = p.coords.latitude; state.lon = p.coords.longitude;
            
            const dist = getD(state.origin.la, state.origin.lo, state.lat, state.lon);
            document.getElementById('gps-tag').innerText = `GPS LINK: ACTIVE | MOVED: ${dist.toFixed(1)}M`;
            
            // 5 Meter check
            if(dist >= 5) document.getElementById('task-btn').disabled = false;
            
            db.ref(`rooms/${state.code}/players/${state.id}`).update({ lat: state.lat, lon: state.lon });
        }, null, {enableHighAccuracy:true});
        
        db.ref(`rooms/${state.code}/tasks`).once('value', s => { state.tasks = s.val() || []; updateTask(); });
    }

    function renderMap() {
        const m = document.getElementById('map-dots'); m.innerHTML = '';
        for(let id in state.players) {
            const p = state.players[id];
            // Center calculation (relative to origin)
            // Multiplier ko 5000000 kiya taaki chote room mein dot move hota dikhe
            const x = 50 + (p.lon - state.origin.lo) * 5000000;
            const y = 50 + (p.lat - state.origin.la) * 5000000;
            
            const dot = document.createElement('div');
            dot.className = 'p-dot';
            dot.style.left = Math.min(Math.max(x, 5), 95) + '%';
            dot.style.top = Math.min(Math.max(y, 5), 95) + '%';
            dot.style.color = (id === state.id) ? '#00f3ff' : '#ff003c';
            dot.style.background = dot.style.color;
            m.appendChild(dot);
        }
    }

    async function handleTask() {
        const b = document.getElementById('task-btn'); const v = document.getElementById('v-cam');
        if(b.innerText === "DO TASK") {
            const s = await navigator.mediaDevices.getUserMedia({video:{facingMode:'environment'}});
            v.srcObject = s; v.classList.remove('hidden'); b.innerText = "VERIFYING...";
            
            setTimeout(async () => {
                const canvas = document.createElement('canvas');
                canvas.width = 50; canvas.height = 50;
                canvas.getContext('2d').drawImage(v, 0, 0, 50, 50);
                const crewColor = await analyzeImage(canvas.toDataURL());
                const targetColor = state.tasks[state.cur].color;
                
                // Color match logic (Strictness: 40 points)
                const diff = Math.abs(crewColor.r - targetColor.r) + Math.abs(crewColor.g - targetColor.g);
                
                if(diff < 80) { // Sahi photo
                    v.srcObject.getTracks().forEach(t => t.stop()); v.classList.add('hidden');
                    state.cur++; state.origin = {la: state.lat, lo: state.lon}; 
                    b.disabled = true; b.innerText = "DO TASK";
                    updateTask(); alert("AI: Intel Verified! Task Done.");
                } else {
                    alert("AI Error: Photo Match Nahi Hui! Sahi jagah ki photo lo.");
                    b.innerText = "DO TASK";
                }
            }, 1000);
        }
    }

    // Basic common functions (addTask, startLobby, joinGame, etc. pre-existing)
    // [Yahan baki purana logic sync kar lena]
    
    function getD(la1, lo1, la2, lo2) {
        const R = 6371000;
        const dLat = (la2-la1)*Math.PI/180;
        const dLon = (lo2-lo1)*Math.PI/180;
        const a = Math.sin(dLat/2)**2 + Math.cos(la1*Math.PI/180)*Math.cos(la2*Math.PI/180)*Math.sin(dLon/2)**2;
        return R * 2 * Math.atan2(Math.sqrt(a), Math.sqrt(1-a));
    }
    
    // Auto-update UI logic...
    function updateTask() {
        const t = state.tasks[state.cur];
        if(t) {
            document.getElementById('hud-task').innerText = t.name;
            document.getElementById('hud-img').src = t.img;
        } else {
            document.getElementById('hud-task').innerText = "MISSION CLEAR";
        }
    }

    async function startLobby() {
        state.code = Math.floor(100000 + Math.random()*900000).toString();
        await db.ref('rooms/'+state.code).set({
            status: 'lobby', tasks: state.tasks,
            players: { [state.id]: { name: document.getElementById('p-name').value, role: 'Crewmate', status: 'alive', lat:0, lon:0 } }
        });
        showScreen('hud'); initHUD(); // Direct for testing, add lobby later
    }
</script>
</body>
                    </html>
