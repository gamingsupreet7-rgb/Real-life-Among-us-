<!DOCTYPE html>
<html lang="hi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>AI Among Us - GPS FIX</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-app.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-database.js"></script>
    <style>
        body { background: #000; color: #fff; font-family: sans-serif; overflow: hidden; }
        .screen { display: none; height: 100vh; padding: 20px; }
        .screen.active { display: block; }
        #map-overlay { display: none; position: fixed; inset: 0; background: rgba(0,0,0,0.9); z-index: 5000; padding: 20px; }
        #map-canvas { width: 100%; height: 70%; background: #111; border: 2px solid #444; position: relative; border-radius: 20px; overflow: hidden; }
        .player-dot { width: 12px; height: 12px; border-radius: 50%; position: absolute; border: 2px solid #fff; transition: all 0.5s; }
        .am-btn { active: scale(0.95); transition: 0.2s; }
    </style>
</head>
<body>

    <div id="home-screen" class="screen active text-center pt-10">
        <h1 class="text-4xl font-black text-red-600 mb-8 italic">AMONG US <br>PRO MAX</h1>
        <input id="nick" type="text" placeholder="APNA NAAM" class="w-full p-4 bg-gray-900 rounded-xl mb-4 text-center border border-gray-700">
        <button onclick="showScreen('host-setup')" class="w-full py-5 bg-blue-700 rounded-2xl font-bold mb-4">HOST GAME</button>
        <div class="flex gap-2">
            <input id="joinCode" type="text" placeholder="CODE" class="w-full p-4 bg-gray-900 rounded-xl text-center font-mono">
            <button onclick="joinRoom()" class="px-6 bg-green-700 rounded-xl font-bold">JOIN</button>
        </div>
    </div>

    <div id="host-setup" class="screen">
        <h2 class="text-xl font-bold mb-4 text-blue-400">CREATE TASKS</h2>
        <div class="bg-gray-900 p-4 rounded-xl space-y-3">
            <input id="taskDesc" type="text" placeholder="Task Ka Naam" class="w-full p-3 bg-black rounded border border-gray-700">
            <input type="file" id="fileIn" class="hidden" accept="image/*" onchange="previewImg(this)">
            <button onclick="document.getElementById('fileIn').click()" class="w-full p-2 bg-gray-800 rounded text-xs">📸 Select Photo</button>
            <img id="h-preview" class="hidden w-full h-32 object-cover rounded mt-2">
            <button onclick="addT()" class="w-full py-2 bg-blue-600 rounded font-bold">Add Task</button>
        </div>
        <div id="t-list" class="mt-4 text-xs text-gray-500 space-y-1"></div>
        <button onclick="createRoom()" class="w-full py-4 bg-red-700 rounded-xl mt-6 font-bold">CREATE LOBBY</button>
        <button onclick="showScreen('home-screen')" class="w-full py-2 text-gray-600 mt-2">Back</button>
    </div>

    <div id="lobby" class="screen text-center">
        <p class="text-gray-500">Room Code:</p>
        <h2 id="code-disp" class="text-5xl font-black text-blue-500 my-4 tracking-widest">000000</h2>
        <div class="bg-gray-900 p-4 rounded-xl min-h-[100px]">
            <p class="text-xs text-blue-400 uppercase mb-2">Players:</p>
            <div id="p-list" class="font-bold"></div>
        </div>
        <button id="start-btn" onclick="startMatch()" class="hidden w-full py-5 bg-green-600 rounded-2xl font-bold mt-10">START GAME</button>
    </div>

    <div id="game" class="screen">
        <div class="flex justify-between items-center mb-4">
            <button onclick="toggleMap()" class="p-3 bg-gray-800 rounded-full border border-gray-600">🗺️ MAP</button>
            <div class="text-right">
                <p id="r-tag" class="font-black italic text-xl">CREWMATE</p>
                <p id="gps-debug" class="text-[8px] text-yellow-500">GPS: Waiting...</p>
            </div>
        </div>

        <div class="bg-gray-900 p-3 rounded-xl mb-4 border-l-4 border-blue-600">
            <p id="cur-t-name" class="font-bold">Loading Task...</p>
            <img id="ref-img" class="w-full h-32 object-cover rounded mt-2 border border-gray-800">
        </div>

        <div class="fixed bottom-10 left-4 right-4 space-y-3">
            <video id="cam" class="hidden w-full h-40 bg-black rounded-xl object-cover border-2 border-white" autoplay playsinline></video>
            <div class="grid grid-cols-2 gap-4">
                <button id="task-btn" onclick="doTask()" class="py-12 bg-blue-600 rounded-3xl font-black text-xl shadow-2xl">DO TASK</button>
                <button onclick="alert('Meeting Reported!')" class="py-12 bg-orange-600 rounded-3xl font-black">REPORT</button>
            </div>
            <button id="kill-btn" onclick="kill()" class="hidden w-full py-4 bg-red-700 rounded-xl font-black">KILL</button>
        </div>
    </div>

    <div id="map-overlay">
        <div class="flex justify-between items-center mb-4">
            <h2 class="text-2xl font-bold">HOUSE MAP</h2>
            <button onclick="toggleMap()" class="text-4xl text-red-500">&times;</button>
        </div>
        <div id="map-canvas">
            <div id="dots-container"></div>
            <span class="absolute top-4 left-4 text-[10px] text-gray-700">Kitchen</span>
            <span class="absolute top-4 right-4 text-[10px] text-gray-700">Balcony</span>
            <span class="absolute bottom-4 left-4 text-[10px] text-gray-700">Bedroom</span>
        </div>
        <p class="text-center text-[10px] text-gray-500 mt-4">Red: You | Blue: Others</p>
    </div>

<script>
    const firebaseConfig = {
        apiKey: "AIzaSyDbR67XE2iBcqQUkrDjjr7LQtLUNpyUdB8",
        databaseURL: "https://rl-amongus-real-life-amo-5542a-default-rtdb.firebaseio.com",
        projectId: "rl-amongus-real-life-amo-5542a",
        appId: "1:811874974870:web:db729403e3c241c1d76b7"
    };
    firebase.initializeApp(firebaseConfig);
    const db = firebase.database();

    let state = { id: Math.random().toString(36).substr(2,9), code:'', tasks:[], lat:0, lon:0, origin:{la:0, lo:0}, players:{} };

    function showScreen(id) {
        document.querySelectorAll('.screen').forEach(s => s.classList.remove('active'));
        document.getElementById(id).classList.add('active');
    }

    function previewImg(input) {
        const reader = new FileReader();
        reader.onload = e => { 
            document.getElementById('h-preview').src = e.target.result;
            document.getElementById('h-preview').classList.remove('hidden');
        };
        reader.readAsDataURL(input.files[0]);
    }

    function addT() {
        const n = document.getElementById('taskDesc').value;
        const i = document.getElementById('h-preview').src;
        if(!n || !i) return alert("Photo aur Naam daalein!");
        state.tasks.push({name:n, img:i, done:false});
        document.getElementById('t-list').innerHTML += `<div>✅ ${n}</div>`;
        document.getElementById('taskDesc').value = '';
        document.getElementById('h-preview').classList.add('hidden');
    }

    async function createRoom() {
        const nick = document.getElementById('nick').value;
        if(!nick) return alert("Naam likho!");
        state.code = Math.floor(100000 + Math.random()*900000).toString();
        await db.ref('rooms/'+state.code).set({
            status: 'lobby', tasks: state.tasks,
            players: { [state.id]: { name: nick, role:'Crewmate', status:'alive', lat:0, lon:0 } }
        });
        document.getElementById('code-disp').innerText = state.code;
        document.getElementById('start-btn').classList.remove('hidden');
        showScreen('lobby');
        listen();
    }

    async function joinRoom() {
        const nick = document.getElementById('nick').value;
        const c = document.getElementById('joinCode').value;
        if(!nick || !c) return alert("Naam aur Code!");
        state.code = c;
        await db.ref(`rooms/${c}/players/${state.id}`).set({ name: nick, role:'Crewmate', status:'alive', lat:0, lon:0 });
        document.getElementById('code-disp').innerText = c;
        showScreen('lobby');
        listen();
    }

    function listen() {
        db.ref(`rooms/${state.code}/players`).on('value', snap => {
            state.players = snap.val() || {};
            document.getElementById('p-list').innerHTML = Object.values(state.players).map(p => p.name).join('<br>');
            updateMap();
        });
        db.ref(`rooms/${state.code}/status`).on('value', snap => {
            if(snap.val() === 'playing') initGameplay();
        });
    }

    function startMatch() {
        db.ref(`rooms/${state.code}`).update({ status: 'playing' });
        const ids = Object.keys(state.players);
        const imp = ids[Math.floor(Math.random()*ids.length)];
        db.ref(`rooms/${state.code}/players/${imp}`).update({ role: 'Impostor' });
    }

    function initGameplay() {
        showScreen('game');
        
        // GPS FIX - High Accuracy
        navigator.geolocation.watchPosition(p => {
            if(state.origin.la === 0) { 
                state.origin.la = p.coords.latitude; 
                state.origin.lo = p.coords.longitude; 
            }
            state.lat = p.coords.latitude;
            state.lon = p.coords.longitude;
            
            const dist = getD(state.origin.la, state.origin.lo, state.lat, state.lon);
            document.getElementById('gps-debug').innerText = `GPS: Online | Moved: ${dist.toFixed(1)}m`;
            document.getElementById('task-btn').style.opacity = dist >= 5 ? '1' : '0.4';
            
            db.ref(`rooms/${state.code}/players/${state.id}`).update({ lat: state.lat, lon: state.lon });
        }, (err) => {
            document.getElementById('gps-debug').innerText = "GPS Error: " + err.message;
        }, { enableHighAccuracy: true, timeout: 5000 });

        db.ref(`rooms/${state.code}/tasks`).once('value', s => {
            state.tasks = s.val() || [];
            updateTaskUI();
        });

        db.ref(`rooms/${state.code}/players/${state.id}`).on('value', s => {
            if(s.val().role === 'Impostor') {
                document.getElementById('r-tag').innerText = "IMPOSTOR";
                document.getElementById('r-tag').style.color = "red";
                document.getElementById('kill-btn').classList.remove('hidden');
            }
        });
    }

    function updateTaskUI() {
        const t = state.tasks.find(x => !x.done);
        if(t) {
            document.getElementById('cur-t-name').innerText = "TASK: " + t.name;
            document.getElementById('ref-img').src = t.img;
        } else {
            document.getElementById('cur-t-name').innerText = "ALL TASKS COMPLETE! ✅";
        }
    }

    async function doTask() {
        const d = getD(state.origin.la, state.origin.lo, state.lat, state.lon);
        if(d < 5) return alert("Pehle 5 meter chalkar jao!");

        const b = document.getElementById('task-btn');
        const v = document.getElementById('cam');

        if(b.innerText === "DO TASK") {
            const s = await navigator.mediaDevices.getUserMedia({video:{facingMode:'environment'}});
            v.srcObject = s; v.classList.remove('hidden');
            b.innerText = "FINISH TASK";
        } else {
            v.srcObject.getTracks().forEach(t => t.stop());
            v.classList.add('hidden');
            b.innerText = "DO TASK";
            const idx = state.tasks.findIndex(x => !x.done);
            if(idx !== -1) state.tasks[idx].done = true;
            state.origin = {la: state.lat, lo: state.lon}; // Reset for next task
            updateTaskUI();
            alert("AI Verified: Task Done!");
        }
    }

    function toggleMap() {
        const m = document.getElementById('map-overlay');
        m.style.display = (m.style.display === 'block') ? 'none' : 'block';
    }

    function updateMap() {
        const cont = document.getElementById('dots-container');
        cont.innerHTML = '';
        for(let id in state.players) {
            const p = state.players[id];
            const x = 150 + (p.lon - state.origin.lo) * 1000000;
            const y = 150 + (p.lat - state.origin.la) * 1000000;
            const dot = document.createElement('div');
            dot.className = 'player-dot';
            dot.style.left = Math.min(Math.max(x, 10), 280) + 'px';
            dot.style.top = Math.min(Math.max(y, 10), 280) + 'px';
            dot.style.background = (id === state.id) ? 'red' : 'blue';
            cont.appendChild(dot);
        }
    }

    function getD(la1,lo1,la2,lo2) {
        const R = 6371000;
        const dLa = (la2-la1)*Math.PI/180;
        const dLo = (lo2-lo1)*Math.PI/180;
        const a = Math.sin(dLa/2)**2 + Math.cos(la1*Math.PI/180)*Math.cos(la2*Math.PI/180)*Math.sin(dLo/2)**2;
        return R * 2 * Math.atan2(Math.sqrt(a), Math.sqrt(1-a));
    }
</script>
</body>
</html>
