<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>AI RC - ULTIMATE ANCHOR v5</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/@tensorflow/tfjs"></script>
    <script src="https://cdn.jsdelivr.net/npm/@tensorflow-models/coco-ssd"></script>
    <style>
        body { margin: 0; overflow: hidden; background: #000; font-family: monospace; touch-action: none; }
        #video { position: fixed; top: 0; left: 0; width: 100%; height: 100%; object-fit: cover; z-index: -1; }
        
        /* HUD UI */
        #hud { position: fixed; top: 10px; left: 10px; color: #0f0; background: rgba(0,0,0,0.8); padding: 10px; border-radius: 5px; z-index: 10; font-size: 10px; border: 1px solid #0f0; }
        #debug { position: fixed; bottom: 130px; left: 50%; transform: translateX(-50%); color: yellow; background: rgba(0,0,0,0.5); padding: 5px; z-index: 10; font-size: 12px; }

        /* Real-Touch Controls */
        .controls { position: fixed; bottom: 20px; width: 100%; display: flex; justify-content: space-around; align-items: center; z-index: 20; pointer-events: none; }
        .btn-group { display: flex; gap: 15px; pointer-events: auto; }
        .btn { width: 75px; height: 75px; background: rgba(255,255,255,0.1); border: 3px solid #fff; border-radius: 50%; color: #fff; display: flex; justify-content: center; align-items: center; font-weight: bold; font-size: 14px; user-select: none; -webkit-tap-highlight-color: transparent; }
        .btn-rect { width: 100px; height: 60px; border-radius: 10px; }
        .btn:active, .active { background: #0f0 !important; color: #000 !important; border-color: #0f0 !important; transform: scale(0.9); }
        
        #perm-btn { position: fixed; top: 50%; left: 50%; transform: translate(-50%, -50%); padding: 20px; background: #0f0; color: #000; font-weight: bold; z-index: 100; border-radius: 10px; cursor: pointer; text-align: center; }
    </style>
</head>
<body>

    <video id="video" autoplay playsinline></video>
    <div id="perm-btn">CLICK HERE TO START<br>(Enable Camera & Sensors)</div>
    
    <div id="hud">
        SYSTEM: <span id="sys-stat">WAITING</span><br>
        AI: <span id="ai-stat">OFFLINE</span><br>
        FLOOR LOCK: <span id="lock-stat">OFF</span>
    </div>

    <div id="debug">Ready to Drive</div>

    <div class="controls">
        <div class="btn-group">
            <div id="left" class="btn">LEFT</div>
            <div id="right" class="btn">RIGHT</div>
        </div>
        <div class="btn-group" style="flex-direction: column;">
            <div id="gas" class="btn btn-rect">GAS</div>
            <div id="brake" class="btn btn-rect" style="height: 40px; border-color: red; color: red;">BRAKE</div>
            <div id="rev" class="btn btn-rect">REV</div>
        </div>
    </div>

    <script>
        let scene, camera, renderer, car, worldGroup, detector;
        let speed = 0, isGas=false, isRev=false, isBrake=false, isL=false, isR=false;
        let aiBlocked = false, alpha=0, beta=0, gamma=0;

        const debug = (msg) => document.getElementById('debug').innerText = msg;

        // 1. Core Initialization
        document.getElementById('perm-btn').onclick = async function() {
            this.style.display = 'none';
            initApp();
        };

        async function initApp() {
            try {
                // Permissions
                const stream = await navigator.mediaDevices.getUserMedia({ video: { facingMode: 'environment' } });
                document.getElementById('video').srcObject = stream;

                if (window.DeviceOrientationEvent && typeof DeviceOrientationEvent.requestPermission === 'function') {
                    await DeviceOrientationEvent.requestPermission();
                }
                window.addEventListener('deviceorientation', (e) => {
                    alpha = e.alpha || 0; // Compass
                    beta = e.beta || 0;   // Tilt Front/Back
                    gamma = e.gamma || 0; // Tilt Left/Right
                    document.getElementById('lock-stat').innerText = "LOCKED";
                });

                setupThreeJS();
                loadAI();
            } catch (e) {
                alert("Permission Error: " + e.message);
            }
        }

        // 2. Three.js Setup with World Anchor
        function setupThreeJS() {
            scene = new THREE.Scene();
            camera = new THREE.PerspectiveCamera(75, window.innerWidth/window.innerHeight, 0.1, 1000);
            renderer = new THREE.WebGLRenderer({ alpha: true, antialias: true });
            renderer.setSize(window.innerWidth, window.innerHeight);
            document.body.appendChild(renderer.domElement);

            // WorldGroup is what stays "fixed" in the room
            worldGroup = new THREE.Group();
            scene.add(worldGroup);

            // Car Construction
            car = new THREE.Group();
            const body = new THREE.Mesh(new THREE.BoxGeometry(1.2, 0.4, 2.2), new THREE.MeshPhongMaterial({color: 0xff0000}));
            car.add(body);
            
            const shadow = new THREE.Mesh(new THREE.PlaneGeometry(2, 3), new THREE.MeshBasicMaterial({color: 0x000000, transparent: true, opacity: 0.3}));
            shadow.rotation.x = -Math.PI/2;
            shadow.position.y = -0.3;
            car.add(shadow);

            // Position car 5 meters ahead in the world
            car.position.set(0, -2, -5);
            worldGroup.add(car);

            scene.add(new THREE.AmbientLight(0xffffff, 1));
            document.getElementById('sys-stat').innerText = "ONLINE";
            animate();
        }

        // 3. AI Object Detection
        async function loadAI() {
            document.getElementById('ai-stat').innerText = "LOADING...";
            detector = await cocoSsd.load();
            document.getElementById('ai-stat').innerText = "ACTIVE";
            detectLoop();
        }

        async function detectLoop() {
            if(detector) {
                const predictions = await detector.detect(document.getElementById('video'));
                let found = predictions.some(p => p.score > 0.5 && p.label !== 'floor');
                if (found) {
                    aiBlocked = true;
                    document.getElementById('ai-stat').style.color = "red";
                    debug("AI: OBSTACLE DETECTED!");
                } else {
                    aiBlocked = false;
                    document.getElementById('ai-stat').style.color = "#0f0";
                }
            }
            setTimeout(detectLoop, 200);
        }

        // 4. Movement & Anchor Logic
        function animate() {
            requestAnimationFrame(animate);

            // THE ANCHOR: This counter-rotates the world so the car stays in one place
            // Alpha handles Left/Right turn of phone, Beta handles Up/Down tilt
            worldGroup.rotation.y = THREE.MathUtils.degToRad(alpha);
            worldGroup.rotation.x = THREE.MathUtils.degToRad(beta - 60); // Adjusting for comfortable hold

            // Drive Logic
            if (isGas && !aiBlocked) {
                speed = Math.min(speed + 0.005, 0.15);
                debug("DRIVING: FORWARD");
            } else if (isRev) {
                speed = Math.max(speed - 0.005, -0.08);
                debug("DRIVING: REVERSE");
            } else if (isBrake) {
                speed *= 0.6;
                debug("DRIVING: BRAKING");
            } else {
                speed *= 0.95;
            }

            if (Math.abs(speed) > 0.01) {
                if (isL) car.rotation.y += 0.05;
                if (isR) car.rotation.y -= 0.05;
            }

            car.translateZ(-speed);
            renderer.render(scene, camera);
        }

        // 5. Bulletproof Input Handling
        function bind(id, variable) {
            const el = document.getElementById(id);
            const start = (e) => {
                e.preventDefault();
                window[variable] = true;
                el.classList.add('active');
            };
            const end = (e) => {
                e.preventDefault();
                window[variable] = false;
                el.classList.remove('active');
            };

            el.addEventListener('touchstart', start, {passive: false});
            el.addEventListener('touchend', end, {passive: false});
            el.addEventListener('mousedown', start);
            el.addEventListener('mouseup', end);
        }

        bind('gas', 'isGas'); bind('rev', 'isRev'); bind('brake', 'isBrake');
        bind('left', 'isL'); bind('right', 'isR');

        window.onresize = () => {
            camera.aspect = window.innerWidth / window.innerHeight;
            camera.updateProjectionMatrix();
            renderer.setSize(window.innerWidth, window.innerHeight);
        };
    </script>
</body>
</html>
