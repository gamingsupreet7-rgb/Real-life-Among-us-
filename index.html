<!DOCTYPE html>
<html lang="hi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>Among Us: Tactical Ultra V2</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-app.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-database.js"></script>
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css" rel="stylesheet">
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Orbitron:wght@900&family=Rajdhani:wght@700&display=swap');
        :root { --n-blue: #00f3ff; --n-red: #ff003c; }
        body, html { margin: 0; padding: 0; width: 100%; height: 100%; background: #000; color: #fff; font-family: 'Rajdhani', sans-serif; overflow: hidden; position: fixed; }
        .glass { background: rgba(255, 255, 255, 0.05); backdrop-filter: blur(15px); border: 1px solid rgba(255, 255, 255, 0.1); border-radius: 20px; }
        .screen { position: absolute; inset: 0; display: none; padding: 15px; flex-direction: column; padding-top: env(safe-area-inset-top); }
        .screen.active { display: flex; }
        
        #map-view { flex-grow: 1; width: 100%; background: radial-gradient(circle, #0a111a 0%, #000 100%); border: 2px solid var(--n-blue); border-radius: 25px; position: relative; overflow: hidden; margin: 10px 0; }
        .p-dot { width: 14px; height: 14px; border-radius: 50%; position: absolute; transform: translate(-50%, -50%); border: 2px solid #fff; transition: all 0.5s ease-out; z-index: 10; }
        .body-marker { width: 20px; height: 20px; position: absolute; transform: translate(-50%, -50%); color: #ff0000; z-index: 5; font-size: 20px; }

        /* Meeting Overlay */
        #meeting-overlay { position: fixed; inset: 0; background: rgba(0,0,0,0.95); z-index: 10000; display: none; flex-direction: column; align-items: center; justify-content: center; padding: 20px; }
        .vote-card { padding: 10px; margin: 5px; border: 1px solid #444; border-radius: 10px; width: 100%; text-align: center; font-weight: bold; }
        
        /* Result Screen */
        #game-result { position: fixed; inset: 0; z-index: 20000; display: none; flex-direction: column; align-items: center; justify-content: center; background: #000; font-family: 'Orbitron'; }
    </style>
</head>
<body>

    <div id="game-result">
        <h1 id="result-title" class="text-6xl mb-4">VICTORY</h1>
        <p id="result-sub" class="text-xl uppercase tracking-widest text-cyan-400">Impostor was Ejected</p>
        <button onclick="location.reload()" class="mt-10 px-8 py-4 bg-white text-black font-bold rounded-xl">BACK TO LOBBY</button>
    </div>

    <div id="meeting-overlay">
        <h2 id="meet-status" class="text-3xl font-black text-red-500 mb-2">EMERGENCY MEETING</h2>
        <div id="meet-timer" class="text-6xl font-['Orbitron'] mb-6 text-white">00:00</div>
        
        <div id="vote-section" class="w-full max-w-sm hidden">
            <p class="text-center text-cyan-400 mb-4">VOTING TIME: <span id="vote-timer">20</span>s</p>
            <div id="player-vote-list" class="grid grid-cols-2 gap-2"></div>
        </div>

        <div id="meeting-setup" class="w-full max-w-sm text-center">
            <p class="mb-2">Set Discussion Time (Seconds):</p>
            <input id="meet-duration" type="number" value="30" class="w-full bg-white/10 p-4 rounded-xl text-center text-2xl mb-4 outline-none">
            <button onclick="confirmMeeting()" class="w-full py-4 bg-cyan-600 rounded-xl font-bold">START MEETING</button>
        </div>
    </div>

    <div id="hud" class="screen active">
        <div class="flex justify-between items-center px-1">
            <div>
                <h2 id="role-tag" class="text-2xl font-black italic">CONNECTING...</h2>
                <p id="gps-tag" class="text-[10px] text-cyan-400 font-mono italic">GPS: SYNCING...</p>
            </div>
            <button onclick="callMeeting()" id="meet-btn" class="bg-orange-600/20 border border-orange-500 text-orange-500 px-4 py-2 rounded-xl text-xs font-bold uppercase">Emergency (1)</button>
        </div>

        <div id="map-view"><div id="map-dots"></div></div>

        <div class="glass p-1 h-28 mb-3 relative overflow-hidden">
            <img id="hud-img" class="w-full h-full object-cover rounded-xl opacity-20">
            <div class="absolute inset-0 flex flex-col justify-center items-center">
                <h3 id="hud-task" class="text-lg font-black uppercase">Locating Tasks...</h3>
                <p id="match-score" class="text-[10px] text-gray-400"></p>
            </div>
        </div>

        <div class="space-y-3 pb-2">
            <video id="v-cam" class="hidden w-full h-40 bg-black rounded-2xl object-cover border border-cyan-500" autoplay playsinline></video>
            <div class="grid grid-cols-2 gap-3">
                <button id="task-btn" onclick="handleTask()" class="bg-gradient-to-r from-blue-700 to-cyan-500 py-8 rounded-2xl font-black text-lg uppercase disabled:opacity-30">DO TASK</button>
                <button id="report-btn" onclick="reportBody()" class="glass bg-red-600/10 border-red-500/30 text-red-500 py-8 font-black uppercase opacity-30">Report</button>
            </div>
        </div>
    </div>

<script>
    // --- CONFIG & STATE ---
    const firebaseConfig = {
        apiKey: "AIzaSyDbR67XE2iBcqQUkrDjjr7LQtLUNpyUdB8",
        databaseURL: "https://rl-amongus-real-life-amo-5542a-default-rtdb.firebaseio.com",
        projectId: "rl-amongus-real-life-amo-5542a",
        appId: "1:811874974870:web:db729403e3c241c1d76b7"
    };
    firebase.initializeApp(firebaseConfig);
    const db = firebase.database();

    let state = {
        id: 'p_' + Math.random().toString(36).substr(2,5),
        code: '123456', // Test Room
        name: 'Agent',
        role: 'Crewmate',
        status: 'alive',
        tasks: [],
        curTask: 0,
        players: {},
        lat: 0, lon: 0,
        origin: { la: 0, lo: 0 },
        meetingsLeft: 1,
        voted: false
    };

    // --- GPS LOGIC (ANTI-JITTER) ---
    function initGPS() {
        navigator.geolocation.watchPosition(p => {
            const newLat = p.coords.latitude;
            const newLon = p.coords.longitude;
            
            if(state.origin.la === 0) { state.origin.la = newLat; state.origin.lo = newLon; }

            // Kalman-ish Filter: Ignore movement < 1.5m to stop jittering
            const delta = getDist(state.lat || newLat, state.lon || newLon, newLat, newLon);
            if(delta > 1.5 || state.lat === 0) {
                state.lat = newLat;
                state.lon = newLon;
            }

            const totalMoved = getDist(state.origin.la, state.origin.lo, state.lat, state.lon);
            document.getElementById('gps-tag').innerText = `STABLE SIGNAL | MOVED: ${totalMoved.toFixed(1)}M`;
            
            // Task Button logic - Only enable if moved 5m
            document.getElementById('task-btn').disabled = (totalMoved < 5);
            
            updateFirebase();
            checkProximity();
        }, null, { enableHighAccuracy: true });
    }

    // --- MEETING & REPORTING ---
    function callMeeting() {
        if(state.meetingsLeft <= 0 || state.status === 'dead') return;
        document.getElementById('meeting-overlay').style.display = 'flex';
        document.getElementById('meeting-setup').style.display = 'block';
    }

    function confirmMeeting() {
        const duration = document.getElementById('meet-duration').value;
        db.ref(`rooms/${state.code}/meeting`).set({
            active: true,
            caller: state.id,
            timer: duration,
            phase: 'discussion',
            startTime: Date.now()
        });
        state.meetingsLeft--;
        document.getElementById('meet-btn').innerText = `Emergency (${state.meetingsLeft})`;
        document.getElementById('meeting-setup').style.display = 'none';
    }

    function reportBody() {
        const bodies = state.players ? Object.values(state.players).filter(p => p.status === 'dead' && !p.reported) : [];
        let canReport = false;
        bodies.forEach(b => {
            if(getDist(state.lat, state.lon, b.lat, b.lon) < 3) canReport = true;
        });

        if(canReport) {
            document.getElementById('meeting-overlay').style.display = 'flex';
            document.getElementById('meet-status').innerText = "BODY REPORTED";
            document.getElementById('meeting-setup').style.display = 'block';
        }
    }

    // --- GAME ENGINE ---
    function updateFirebase() {
        db.ref(`rooms/${state.code}/players/${state.id}`).update({
            lat: state.lat, lon: state.lon, status: state.status, role: state.role, name: state.name
        });
    }

    function sync() {
        db.ref(`rooms/${state.code}/players`).on('value', snap => {
            state.players = snap.val() || {};
            renderMap();
            checkVictory();
        });

        db.ref(`rooms/${state.code}/meeting`).on('value', snap => {
            const m = snap.val();
            if(!m || !m.active) {
                document.getElementById('meeting-overlay').style.display = 'none';
                return;
            }
            handleMeetingPhase(m);
        });
    }

    function handleMeetingPhase(m) {
        document.getElementById('meeting-overlay').style.display = 'flex';
        const elapsed = Math.floor((Date.now() - m.startTime) / 1000);
        
        if(m.phase === 'discussion') {
            const remaining = m.timer - elapsed;
            document.getElementById('meet-timer').innerText = remaining > 0 ? remaining : "VOTE!";
            if(remaining <= 0 && state.id === m.caller) {
                db.ref(`rooms/${state.code}/meeting`).update({ phase: 'voting', startTime: Date.now() });
            }
        } else if(m.phase === 'voting') {
            document.getElementById('vote-section').classList.remove('hidden');
            const remaining = 20 - elapsed;
            document.getElementById('vote-timer').innerText = remaining;
            
            if(document.getElementById('player-vote-list').innerHTML === "") {
                renderVoteList();
            }

            if(remaining <= 0 && state.id === m.caller) {
                tallyVotes();
            }
        }
    }

    function renderVoteList() {
        const list = document.getElementById('player-vote-list');
        list.innerHTML = "";
        Object.values(state.players).forEach(p => {
            if(p.status === 'alive') {
                const btn = document.createElement('button');
                btn.className = "vote-card bg-white/10";
                btn.innerText = p.name;
                btn.onclick = () => castVote(p.id);
                list.appendChild(btn);
            }
        });
    }

    function castVote(targetId) {
        if(state.voted) return;
        db.ref(`rooms/${state.code}/votes/${targetId}`).transaction(c => (c || 0) + 1);
        state.voted = true;
        alert("Vote Cast!");
    }

    async function tallyVotes() {
        const snap = await db.ref(`rooms/${state.code}/votes`).once('value');
        const votes = snap.val() || {};
        let maxVotes = 0, ejectedId = null;
        
        for(let id in votes) {
            if(votes[id] > maxVotes) { maxVotes = votes[id]; ejectedId = id; }
        }

        if(ejectedId) {
            db.ref(`rooms/${state.code}/players/${ejectedId}`).update({ status: 'dead' });
            db.ref(`rooms/${state.code}/lastEjected`).set(state.players[ejectedId]);
        }
        
        db.ref(`rooms/${state.code}/meeting`).remove();
        db.ref(`rooms/${state.code}/votes`).remove();
        state.voted = false;
        document.getElementById('vote-section').classList.add('hidden');
        document.getElementById('player-vote-list').innerHTML = "";
    }

    // --- PHOTO AI ---
    async function getHash(src) {
        return new Promise(res => {
            const img = new Image(); img.src = src; img.onload = () => {
                const cvs = document.createElement('canvas'); const ctx = cvs.getContext('2d');
                cvs.width = 12; cvs.height = 12; ctx.drawImage(img, 0, 0, 12, 12);
                const d = ctx.getImageData(0,0,12,12).data;
                let h = ""; for(let i=0; i<d.length; i+=4) h += ((d[i]+d[i+1]+d[i+2])/3 > 125 ? "1" : "0");
                res(h);
            }
        });
    }

    async function handleTask() {
        const b = document.getElementById('task-btn'); const v = document.getElementById('v-cam');
        if(b.innerText === "DO TASK") {
            const s = await navigator.mediaDevices.getUserMedia({ video: { facingMode: 'environment' } });
            v.srcObject = s; v.classList.remove('hidden'); b.innerText = "CONFIRM";
        } else {
            const cvs = document.createElement('canvas'); cvs.width = 100; cvs.height = 100;
            cvs.getContext('2d').drawImage(v, 0, 0, 100, 100);
            const crewH = await getHash(cvs.toDataURL());
            const targetH = state.tasks[state.curTask]?.hash || "000";
            
            let diff = 0; for(let i=0; i<144; i++) if(crewH[i] !== targetH[i]) diff++;
            const match = Math.round((1 - diff/144) * 100);
            document.getElementById('match-score').innerText = `Last Match: ${match}%`;

            if(match > 50) {
                v.srcObject.getTracks().forEach(t => t.stop()); v.classList.add('hidden');
                state.curTask++; state.origin = { la: state.lat, lo: state.lon };
                b.innerText = "DO TASK"; b.disabled = true;
                alert("TASK COMPLETE!");
            } else {
                alert("AI: No Match! Try different angle.");
                b.innerText = "DO TASK";
            }
        }
    }

    // --- MAP & VICTORY ---
    function renderMap() {
        const m = document.getElementById('map-dots'); m.innerHTML = '';
        for(let id in state.players) {
            const p = state.players[id];
            if(p.status === 'dead') {
                m.innerHTML += `<div class="body-marker" style="left:${50+(p.lon-state.origin.lo)*8000000}%; top:${50+(p.lat-state.origin.la)*8000000}%"><i class="fas fa-skull"></i></div>`;
                continue;
            }
            const dot = document.createElement('div');
            dot.className = 'p-dot';
            dot.style.left = 50 + (p.lon - state.origin.lo) * 8000000 + '%';
            dot.style.top = 50 + (p.lat - state.origin.la) * 8000000 + '%';
            dot.style.color = (id === state.id) ? '#00f3ff' : (state.role==='Impostor'?'#ff003c':'#fff');
            dot.style.background = dot.style.color;
            m.appendChild(dot);
        }
    }

    function checkVictory() {
        const ps = Object.values(state.players);
        const alive = ps.filter(p => p.status === 'alive');
        const impAlive = alive.filter(p => p.role === 'Impostor').length;
        const crewAlive = alive.filter(p => p.role === 'Crewmate').length;

        if(impAlive === 0 && ps.length > 0) showEnd('VICTORY', 'Impostor Eliminated');
        if(crewAlive <= 1 && ps.length > 1) showEnd('DEFEAT', 'Impostor Controlled Ship');
    }

    function showEnd(title, sub) {
        const screen = document.getElementById('game-result');
        screen.style.display = 'flex';
        document.getElementById('result-title').innerText = title;
        document.getElementById('result-title').style.color = title === 'VICTORY' ? '#00f3ff' : '#ff003c';
        document.getElementById('result-sub').innerText = sub;
    }

    function getDist(la1, lo1, la2, lo2) {
        const R = 6371000;
        const dLat = (la2-la1)*Math.PI/180;
        const dLon = (lo2-lo1)*Math.PI/180;
        const a = Math.sin(dLat/2)**2 + Math.cos(la1*Math.PI/180)*Math.cos(la2*Math.PI/180)*Math.sin(dLon/2)**2;
        return R * 2 * Math.atan2(Math.sqrt(a), Math.sqrt(1-a));
    }

    function checkProximity() {
        const bodies = Object.values(state.players).filter(p => p.status === 'dead');
        let near = false;
        bodies.forEach(b => { if(getDist(state.lat, state.lon, b.lat, b.lon) < 4) near = true; });
        const rBtn = document.getElementById('report-btn');
        rBtn.style.opacity = near ? "1" : "0.3";
    }

    // Start
    initGPS();
    sync();

</script>
</body>
                    </html>
