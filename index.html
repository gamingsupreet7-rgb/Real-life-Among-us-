<!DOCTYPE html>
<html lang="hi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Among Us Real-Life PRO</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-app.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-database.js"></script>
    <style>
        body { background-color: #0b0e14; color: #fff; font-family: sans-serif; }
        .task-card { background: #1c232e; border-left: 4px solid #3ea6ff; padding: 10px; margin-bottom: 8px; border-radius: 4px; }
        #camera-preview { width: 100%; height: 200px; background: #000; border-radius: 8px; display: none; object-fit: cover; }
    </style>
</head>
<body class="p-4">

    <div id="app" class="max-w-md mx-auto">
        <div id="lobby" class="space-y-4">
            <h1 class="text-3xl font-bold text-center text-blue-500">AMONG US PRO</h1>
            <input id="nick" type="text" placeholder="NAME" class="w-full p-4 bg-gray-800 rounded">
            
            <div id="host-only" class="p-4 border-2 border-dashed border-gray-600 rounded">
                <p class="text-sm mb-2 text-gray-400">HOST: Add Custom Tasks</p>
                <input id="custom-task-input" type="text" placeholder="e.g. Go to Balcony" class="w-full p-2 bg-gray-900 text-sm mb-2">
                <button onclick="addCustomTask()" class="bg-blue-600 p-2 rounded text-xs">ADD TASK</button>
                <div id="added-tasks" class="text-xs mt-2 text-blue-300"></div>
            </div>

            <button onclick="createRoom()" class="w-full p-4 bg-blue-700 rounded font-bold">HOST GAME</button>
            <input id="room-in" type="text" placeholder="CODE" class="w-full p-4 bg-gray-800 rounded">
            <button onclick="joinRoom()" class="w-full p-4 bg-green-700 rounded font-bold">JOIN GAME</button>
        </div>

        <div id="game" class="hidden">
            <div id="gps-status" class="text-[10px] text-yellow-500 mb-2 font-mono">GPS: Checking location...</div>
            <h2 id="role" class="text-2xl font-bold mb-4">CREWMATE</h2>
            
            <div id="task-container" class="space-y-2 mb-4">
                </div>

            <video id="camera-preview" autoplay playsinline></video>
            <canvas id="photo-canvas" class="hidden"></canvas>

            <div class="grid grid-cols-2 gap-2 mt-4">
                <button id="main-action-btn" onclick="handleAction()" class="p-8 bg-blue-600 rounded-xl font-bold">DO TASK</button>
                <button onclick="triggerMeeting()" class="p-8 bg-orange-600 rounded-xl font-bold text-sm text-center">REPORT / MEETING</button>
            </div>
        </div>
    </div>

<script>
    const firebaseConfig = {
        apiKey: "AIzaSyDbR67XE2iBcqQUkrDjjr7LQtLUNpyUdB8",
        databaseURL: "https://rl-amongus-real-life-amo-5542a-default-rtdb.firebaseio.com",
        projectId: "rl-amongus-real-life-amo-5542a",
        appId: "1:811874974870:web:db729403e3c241c1d76b7"
    };
    firebase.initializeApp(firebaseConfig);
    const db = firebase.database();

    let state = { code: '', id: Date.now(), tasks: [], customTasks: [], startPos: null, currentTaskIndex: 0 };

    function addCustomTask() {
        const task = document.getElementById('custom-task-input').value;
        if(task) {
            state.customTasks.push(task);
            document.getElementById('added-tasks').innerHTML += `• ${task}<br>`;
            document.getElementById('custom-task-input').value = '';
        }
    }

    async function createRoom() {
        state.code = Math.floor(100000 + Math.random() * 900000).toString();
        await db.ref('rooms/' + state.code).set({
            state: 'playing',
            customTasks: state.customTasks,
            players: { [state.id]: { name: document.getElementById('nick').value, role: 'Crewmate' } }
        });
        startGame();
    }

    async function joinRoom() {
        state.code = document.getElementById('room-in').value;
        await db.ref(`rooms/${state.code}/players/${state.id}`).set({
            name: document.getElementById('nick').value, role: 'Crewmate'
        });
        startGame();
    }

    function startGame() {
        document.getElementById('lobby').classList.add('hidden');
        document.getElementById('game').classList.remove('hidden');
        initGPS();
        loadTasks();
    }

    // --- GPS SYSTEM ---
    function initGPS() {
        if ("geolocation" in navigator) {
            navigator.geolocation.watchPosition((pos) => {
                if(!state.startPos) state.startPos = pos.coords;
                const dist = calculateDistance(state.startPos.latitude, state.startPos.longitude, pos.coords.latitude, pos.coords.longitude);
                document.getElementById('gps-status').innerText = `GPS: Moved ${dist.toFixed(1)} meters`;
            });
        }
    }

    function calculateDistance(lat1, lon1, lat2, lon2) {
        const R = 6371e3; // metres
        const φ1 = lat1 * Math.PI/180;
        const φ2 = lat2 * Math.PI/180;
        const Δφ = (lat2-lat1) * Math.PI/180;
        const Δλ = (lon2-lon1) * Math.PI/180;
        const a = Math.sin(Δφ/2) * Math.sin(Δφ/2) + Math.cos(φ1) * Math.cos(φ2) * Math.sin(Δλ/2) * Math.sin(Δλ/2);
        return R * 2 * Math.atan2(Math.sqrt(a), Math.sqrt(1-a));
    }

    // --- CAMERA SYSTEM ---
    async function startCamera() {
        const stream = await navigator.mediaDevices.getUserMedia({ video: { facingMode: "environment" } });
        const video = document.getElementById('camera-preview');
        video.srcObject = stream;
        video.style.display = 'block';
    }

    function takePhoto() {
        const video = document.getElementById('camera-preview');
        const canvas = document.getElementById('photo-canvas');
        canvas.width = video.videoWidth;
        canvas.height = video.videoHeight;
        canvas.getContext('2d').drawImage(video, 0, 0);
        video.style.display = 'none';
        video.srcObject.getTracks().forEach(track => track.stop());
        return canvas.toDataURL('image/jpeg');
    }

    // --- TASK LOGIC ---
    function loadTasks() {
        db.ref(`rooms/${state.code}/customTasks`).once('value', snap => {
            const tasks = snap.val() || ["Scan QR in Kitchen", "Fix Lights in Hallway"];
            state.tasks = tasks.map(t => ({ text: t, done: false }));
            renderTasks();
        });
    }

    function renderTasks() {
        let html = '';
        state.tasks.forEach((t, i) => {
            html += `<div class="task-card ${t.done ? 'opacity-50 border-green-500' : ''}">
                ${t.done ? '✅' : '⏳'} ${t.text}
            </div>`;
        });
        document.getElementById('task-container').innerHTML = html;
    }

    async function handleAction() {
        const btn = document.getElementById('main-action-btn');
        
        if (btn.innerText === "DO TASK") {
            await startCamera();
            btn.innerText = "TAKE PROOF PHOTO";
            btn.className = "p-8 bg-green-600 rounded-xl font-bold";
        } else {
            const photoData = takePhoto();
            // In a real app, you'd send photoData to Firebase for host to verify
            // For now, we simulate success
            state.tasks[state.currentTaskIndex].done = true;
            state.currentTaskIndex++;
            btn.innerText = "DO TASK";
            btn.className = "p-8 bg-blue-600 rounded-xl font-bold";
            renderTasks();
            alert("Task Photo Captured! Verification Sent.");
        }
    }

    function triggerMeeting() {
        alert("EMERGENCY MEETING! Sab log ek jagah ikatthe ho jao.");
    }
</script>
</body>
</html>
