<!DOCTYPE html>
<html lang="hi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>Among Us: Tactical AI Pro (Heavy Edition)</title>
    <script src="https://cdn.jsdelivr.net/npm/@tensorflow/tfjs"></script>
    <script src="https://cdn.jsdelivr.net/npm/@tensorflow-models/mobilenet"></script>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-app.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-database.js"></script>
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css" rel="stylesheet">
    
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Orbitron:wght@900&family=Rajdhani:wght@700&display=swap');
        body { margin: 0; background: #000; color: #fff; font-family: 'Rajdhani', sans-serif; overflow: hidden; }
        .screen { position: absolute; inset: 0; display: none; padding: 20px; flex-direction: column; background: radial-gradient(circle at center, #0a1128 0%, #000 100%); z-index: 10; }
        .screen.active { display: flex !important; }
        
        /* INSTANT RESPONSE BUTTONS */
        button { transition: all 0.05s cubic-bezier(0, 0, 0.2, 1); cursor: pointer; border: 1px solid rgba(255,255,255,0.1); }
        button:active { transform: scale(0.9) !important; filter: brightness(1.5); box-shadow: 0 0 20px #00f3ff; }
        
        .glass { background: rgba(255, 255, 255, 0.03); backdrop-filter: blur(20px); border: 1px solid rgba(255, 255, 255, 0.1); border-radius: 24px; }
        .p-dot { width: 16px; height: 16px; border-radius: 50%; position: absolute; transform: translate(-50%, -50%); border: 2px solid #fff; transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1); box-shadow: 0 0 15px currentColor; }
        
        #meeting-ui { position: fixed; inset: 0; background: rgba(0,0,0,0.95); z-index: 9999; display: none; flex-direction: column; align-items: center; justify-content: center; }
    </style>
</head>
<body>

<div id="loading-overlay" class="fixed inset-0 bg-black z-[10000] flex flex-col items-center justify-center">
    <div class="text-cyan-400 font-['Orbitron'] text-xl mb-4 animate-pulse text-center px-4">BOOTING HEAVY NEURAL ENGINE...</div>
    <div class="w-64 h-2 bg-gray-800 rounded-full overflow-hidden">
        <div id="boot-progress" class="h-full bg-cyan-500 transition-all duration-300" style="width: 0%"></div>
    </div>
</div>

<div id="scr-login" class="screen active justify-center">
    <h1 class="text-6xl font-black italic text-center mb-10 tracking-tighter">TACTICAL<br><span class="text-cyan-400 font-['Orbitron'] text-2xl tracking-[0.3em]">AMONG US</span></h1>
    <div class="glass p-8 space-y-5">
        <input id="p-name" type="text" placeholder="AGENT NAME" class="w-full bg-black/60 p-5 rounded-2xl border border-white/10 text-center font-bold uppercase text-cyan-400 text-xl outline-none">
        <button onclick="initApp()" class="w-full py-6 bg-cyan-600 rounded-2xl font-black text-2xl shadow-[0_0_30px_rgba(8,145,178,0.4)]">INITIALIZE</button>
    </div>
</div>

<div id="scr-setup" class="screen overflow-y-auto pt-16">
    <button onclick="show('scr-login')" class="absolute top-6 left-6 text-2xl text-cyan-400"><i class="fas fa-arrow-left"></i></button>
    <h2 class="text-3xl font-bold text-cyan-400 mb-6 font-['Orbitron'] uppercase">Host Setup</h2>
    <div class="glass p-6 space-y-4">
        <input id="t-name" type="text" placeholder="LOCATION NAME" class="w-full bg-black p-5 rounded-xl border border-white/10 font-bold uppercase text-cyan-400">
        <input type="file" id="t-file" class="hidden" accept="image/*" onchange="handleFile(this)">
        <button onclick="document.getElementById('t-file').click()" class="w-full py-12 border-2 border-dashed border-cyan-500/30 rounded-2xl bg-black/40">
            <span id="t-hint" class="font-bold text-gray-400">CAPTURE TARGET PHOTO</span>
            <img id="t-prev" class="hidden w-full h-40 object-cover rounded-xl mt-2 border-2 border-cyan-500">
        </button>
        <button onclick="saveTask()" class="w-full py-5 bg-cyan-700 rounded-2xl font-black text-xl uppercase">Save Intel</button>
    </div>
    <div id="t-list" class="flex gap-4 mt-6 overflow-x-auto p-2 min-h-[100px]"></div>
    <button onclick="createRoom()" class="mt-auto mb-10 py-6 bg-green-600 rounded-2xl font-black text-2xl uppercase">Open Mission Lobby</button>
</div>

<div id="scr-hud" class="screen">
    <div class="flex justify-between items-start">
        <div>
            <h2 id="hud-role" class="text-5xl font-black italic uppercase leading-none">CREWMATE</h2>
            <div id="hud-gps" class="text-[10px] text-cyan-500 font-mono mt-2 font-bold bg-cyan-950/30 p-2 rounded-lg">GPS: SEARCHING SATELLITES...</div>
        </div>
        <div class="flex flex-col gap-2">
            <button onclick="toggleMap()" class="bg-white/10 p-5 rounded-2xl border border-white/20 text-2xl text-cyan-400"><i class="fas fa-map-marked-alt"></i></button>
            <button onclick="callMeeting()" class="bg-red-600 p-3 rounded-lg text-[10px] font-black uppercase">Meeting</button>
        </div>
    </div>

    <div class="glass p-5 flex items-center gap-5 my-6 border-l-4 border-cyan-500">
        <img id="hud-task-img" src="" class="w-20 h-20 object-cover rounded-xl border border-white/10 bg-black">
        <div>
            <p class="text-[10px] text-cyan-400 font-black uppercase">Current Objective</p>
            <h3 id="hud-task-name" class="text-xl font-black uppercase">Syncing...</h3>
        </div>
    </div>

    <video id="v-cam" class="hidden w-full h-64 bg-black rounded-[30px] border-4 border-cyan-500/50 mb-5 object-cover" autoplay playsinline></video>

    <div class="grid grid-cols-2 gap-5 mt-auto pb-10">
        <button id="task-btn" onclick="runTask()" class="py-12 bg-gradient-to-b from-cyan-500 to-blue-700 rounded-[40px] font-black text-2xl shadow-xl disabled:opacity-30" disabled>TASK</button>
        <div class="flex flex-col gap-4">
            <button id="kill-btn" onclick="killPlayer()" class="hidden bg-red-900/40 text-red-500 border-2 border-red-500 rounded-3xl flex-1 font-black text-2xl">KILL</button>
            <button id="report-btn" onclick="report()" class="bg-gray-800 text-gray-500 rounded-3xl flex-1 font-black text-sm opacity-50">REPORT</button>
        </div>
    </div>
</div>

<div id="meeting-ui">
    <h2 id="m-status" class="text-5xl font-['Orbitron'] text-red-500 mb-2 italic">DISCUSSION</h2>
    <div id="m-timer" class="text-9xl font-['Orbitron'] mb-10 text-white">00</div>
    <div id="m-setup" class="glass p-8 w-80 text-center">
        <p class="mb-4 text-xs font-bold text-cyan-400">SET TIME (1 = 1 MINUTE)</p>
        <input id="m-val" type="number" value="1" class="w-full bg-black p-6 rounded-2xl text-center mb-6 text-4xl border border-cyan-500 text-cyan-400 font-black">
        <button onclick="confirmMeet()" class="w-full py-5 bg-cyan-600 rounded-2xl font-black uppercase">Confirm Sync</button>
    </div>
    <div id="v-section" class="hidden w-80 text-center">
        <p class="mb-6 text-xl font-black text-cyan-400 uppercase">VOTING PHASE: <span id="v-timer" class="text-white">20</span>s</p>
        <div id="v-list" class="grid grid-cols-2 gap-4"></div>
    </div>
</div>

<script>
    const firebaseConfig = {
        apiKey: "AIzaSyDbR67XE2iBcqQUkrDjjr7LQtLUNpyUdB8",
        databaseURL: "https://rl-amongus-real-life-amo-5542a-default-rtdb.firebaseio.com",
        projectId: "rl-amongus-real-life-amo-5542a",
        appId: "1:811874974870:web:db729403e3c241c1d76b7"
    };
    firebase.initializeApp(firebaseConfig);
    const db = firebase.database();

    let state = { id:'p'+Math.floor(Math.random()*999), name:'', code:'', tasks:[], cur:0, role:'Crewmate', status:'alive', lat:0, lon:0, origin:{la:0, lo:0}, players:{} };
    let ai;

    // --- HEAVY BOOTING (Neural Engine) ---
    async function boot() {
        const bar = document.getElementById('boot-progress');
        bar.style.width = "40%";
        ai = await mobilenet.load({version: 2, alpha: 1.0}); // Heavy V2 Model
        bar.style.width = "100%";
        setTimeout(() => document.getElementById('loading-overlay').style.display='none', 800);
    }
    boot();

    // --- HIGH WEIGHT GPS (Sub-Meter Smoothing) ---
    function initGPS() {
        navigator.geolocation.watchPosition(p => {
            const lat = p.coords.latitude; const lon = p.coords.longitude;
            const acc = p.coords.accuracy;
            
            if(state.origin.la === 0) { state.origin.la = lat; state.origin.lo = lon; }
            
            // Simple Low-Pass Filter for smoothing
            state.lat = state.lat === 0 ? lat : state.lat * 0.2 + lat * 0.8;
            state.lon = state.lon === 0 ? lon : state.lon * 0.2 + lon * 0.8;

            document.getElementById('hud-gps').innerText = `PRECISION GPS: ${acc.toFixed(1)}m | SYNC: ACTIVE`;
            document.getElementById('hud-gps').style.color = acc < 10 ? "#4ade80" : "#fbbf24";

            db.ref(`rooms/${state.code}/players/${state.id}`).update({ lat: state.lat, lon: state.lon });
            checkProximity();
        }, null, { enableHighAccuracy: true, maximumAge: 0, timeout: 5000 });
    }

    // --- TASK SYSTEM (NO BUG VERSION) ---
    function handleFile(input) {
        if (!input.files[0]) return;
        const reader = new FileReader();
        reader.onload = (e) => {
            const img = document.getElementById('t-prev');
            img.src = e.target.result;
            img.classList.remove('hidden');
            document.getElementById('t-hint').classList.add('hidden');
        };
        reader.readAsDataURL(input.files[0]);
    }

    function saveTask() {
        const n = document.getElementById('t-name').value;
        const i = document.getElementById('t-prev').src;
        if(!n || !i || i.includes('hidden')) return alert("Bhai, Photo aur Naam dono chahiye!");
        
        state.tasks.push({ name: n.toUpperCase(), img: i, lat: state.lat || 0, lon: state.lon || 0 });
        document.getElementById('t-list').innerHTML += `<img src="${i}" class="w-16 h-16 rounded-xl border-2 border-cyan-500 flex-shrink-0">`;
        
        document.getElementById('t-name').value = '';
        document.getElementById('t-prev').classList.add('hidden');
        document.getElementById('t-hint').classList.remove('hidden');
    }

    function checkProximity() {
        const t = state.tasks[state.cur]; if(!t || !t.lat) return;
        const d = getDist(state.lat, state.lon, t.lat, t.lon);
        const b = document.getElementById('task-btn');
        if(d < 15) { // 15 Meters radius
            b.disabled = false; b.innerText = "START AI SCAN"; b.classList.remove('opacity-30');
        } else {
            b.disabled = true; b.innerText = `${Math.round(d)}m AWAY`; b.classList.add('opacity-30');
        }
    }

    async function runTask() {
        const b = document.getElementById('task-btn'); const v = document.getElementById('v-cam');
        if(b.innerText === "START AI SCAN") {
            const s = await navigator.mediaDevices.getUserMedia({ video: { facingMode: 'environment' } });
            v.srcObject = s; v.classList.remove('hidden'); b.innerText = "VERIFYING...";
        } else {
            const ref = new Image(); ref.src = state.tasks[state.cur].img;
            await new Promise(r => ref.onload = r);
            const feat1 = ai.infer(ref, true);
            const feat2 = ai.infer(v, true);
            const sim = 1 - (await tf.losses.cosineDistance(feat1, feat2).data())[0];
            
            if(sim > 0.80) { 
                alert("✅ AI MATCHED: " + Math.round(sim*100) + "%");
                state.cur++; updateHUD(); stopCam(v, b);
            } else {
                alert("❌ REJECTED: Match Only " + Math.round(sim*100) + "%. Move closer to original angle!");
                b.innerText = "START AI SCAN";
            }
        }
    }

    function stopCam(v, b) { if(v.srcObject) v.srcObject.getTracks().forEach(t=>t.stop()); v.classList.add('hidden'); b.innerText = "TASK"; }

    // --- MEETING ENGINE (HEAVY FIX) ---
    function callMeeting() { db.ref(`rooms/${state.code}/meeting`).set({ active: true, phase: 'setup' }); }
    
    function confirmMeet() {
        let t = document.getElementById('m-val').value;
        if(t > 0 && t < 10) t = t * 60; // 1 = 60s
        db.ref(`rooms/${state.code}/meeting`).update({ active: true, phase: 'disc', time: t, start: Date.now(), caller: state.id });
    }

    function handleMeetingUI(m) {
        const ui = document.getElementById('meeting-ui'); ui.style.display = 'flex';
        const elapsed = Math.floor((Date.now() - m.start)/1000);
        if(m.phase === 'setup') {
            document.getElementById('m-setup').style.display = 'block';
            document.getElementById('v-section').style.display = 'none';
        } else if(m.phase === 'disc') {
            document.getElementById('m-setup').style.display = 'none';
            const rem = m.time - elapsed;
            document.getElementById('m-timer').innerText = rem > 0 ? rem : "VOTE";
            if(rem <= 0 && state.id === m.caller) db.ref(`rooms/${state.code}/meeting`).update({ phase: 'vote', start: Date.now() });
        } else if(m.phase === 'vote') {
            document.getElementById('v-section').style.display = 'block';
            const rem = 20 - elapsed; document.getElementById('v-timer').innerText = rem;
            if(document.getElementById('v-list').innerHTML === "") renderVoteList();
            if(rem <= 0 && state.id === m.caller) tallyVotes();
        }
    }

    function renderVoteList() {
        const list = document.getElementById('v-list'); list.innerHTML = "";
        Object.values(state.players).forEach(p => { if(p.status === 'alive') {
            const b = document.createElement('button'); b.className = "p-4 bg-white/10 rounded-xl font-bold uppercase text-xs";
            b.innerText = p.name;
            b.onclick = () => { db.ref(`rooms/${state.code}/votes/${p.id}`).transaction(c => (c||0)+1); list.innerHTML = "<p class='col-span-2 text-cyan-400'>VOTE RECORDED</p>"; };
            list.appendChild(b);
        }});
    }

    async function tallyVotes() {
        const snap = await db.ref(`rooms/${state.code}/votes`).once('value');
        const v = snap.val() || {};
        let max = 0, target = null;
        for(let id in v) { if(v[id] > max) { max = v[id]; target = id; } }
        if(target) db.ref(`rooms/${state.code}/players/${target}`).update({ status: 'dead' });
        db.ref(`rooms/${state.code}/meeting`).remove(); db.ref(`rooms/${state.code}/votes`).remove();
    }

    // --- UTILS ---
    function initApp() { state.name = document.getElementById('p-name').value.toUpperCase(); if(state.name) show('scr-setup'); initGPS(); }
    
    async function createRoom() {
        if(state.tasks.length === 0) return alert("Task list is empty!");
        state.code = Math.floor(100000 + Math.random()*900000).toString();
        await db.ref('rooms/'+state.code).set({ status:'lobby', tasks: state.tasks });
        joinGame(state.code); document.getElementById('start-btn').classList.remove('hidden');
    }

    function joinGame(c) {
        state.code = c || document.getElementById('join-code').value.toUpperCase();
        db.ref(`rooms/${state.code}/players/${state.id}`).set({ name: state.name, role:'Crewmate', status:'alive', lat:0, lon:0, id: state.id });
        show('scr-hud'); sync();
    }

    function sync() {
        db.ref(`rooms/${state.code}/players`).on('value', snap => {
            state.players = snap.val() || {};
            const me = state.players[state.id];
            if(me) {
                state.role = me.role; state.status = me.status;
                document.getElementById('hud-role').innerText = state.role;
                document.getElementById('hud-role').style.color = state.role === 'Impostor' ? '#ef4444' : '#06b6d4';
                if(state.role === 'Impostor') document.getElementById('kill-btn').classList.remove('hidden');
                if(state.status === 'dead') { document.body.style.filter = "grayscale(1) contrast(1.2)"; document.getElementById('task-btn').disabled = true; }
            }
        });
        db.ref(`rooms/${state.code}/status`).on('value', s => { if(s.val() === 'playing') { initGPS(); db.ref(`rooms/${state.code}/tasks`).once('value', t => { state.tasks = t.val(); updateHUD(); }); } });
        db.ref(`rooms/${state.code}/meeting`).on('value', snap => { if(snap.val()?.active) handleMeetingUI(snap.val()); else document.getElementById('meeting-ui').style.display = 'none'; });
    }

    function updateHUD() {
        const t = state.tasks[state.cur];
        if(t) { document.getElementById('hud-task-name').innerText = t.name; document.getElementById('hud-task-img').src = t.img; }
        else { document.getElementById('hud-task-name').innerText = "ALL TASKS DONE"; }
    }

    function getDist(la1, lo1, la2, lo2) {
        const R = 6371000; const dLat = (la2-la1)*Math.PI/180; const dLon = (lo2-lo1)*Math.PI/180;
        const a = Math.sin(dLat/2)**2 + Math.cos(la1*Math.PI/180)*Math.cos(la2*Math.PI/180)*Math.sin(dLon/2)**2;
        return R * 2 * Math.atan2(Math.sqrt(a), Math.sqrt(1-a));
    }

    function show(id) { document.querySelectorAll('.screen').forEach(s => s.classList.remove('active')); document.getElementById(id).classList.add('active'); }
</script>
</body>
</html>
