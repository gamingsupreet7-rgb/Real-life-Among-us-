<!DOCTYPE html>
<html lang="hi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Among Us: Tactical Legacy</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-app.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-database.js"></script>
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css" rel="stylesheet">
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Orbitron:wght@900&family=Rajdhani:wght@700&display=swap');
        body { margin: 0; background: #000; color: #fff; font-family: 'Rajdhani', sans-serif; overflow: hidden; }
        .screen { position: absolute; inset: 0; display: none; padding: 20px; flex-direction: column; background: #000; }
        .screen.active { display: flex; }
        .glass { background: rgba(255, 255, 255, 0.05); backdrop-filter: blur(10px); border: 1px solid rgba(255, 255, 255, 0.1); border-radius: 15px; }
        .btn-prime { background: linear-gradient(45deg, #0041ff, #00f3ff); border-radius: 10px; font-family: 'Orbitron'; font-weight: 900; color: white; }
        #map-view { flex-grow: 1; background: radial-gradient(circle, #0a111a 0%, #000 100%); border: 2px solid #00f3ff; border-radius: 20px; position: relative; margin: 10px 0; overflow: hidden; }
        .p-dot { width: 12px; height: 12px; border-radius: 50%; position: absolute; transform: translate(-50%, -50%); border: 2px solid #fff; }
        #game-result { position: fixed; inset: 0; z-index: 9999; display: none; flex-direction: column; align-items: center; justify-content: center; background: #000; }
    </style>
</head>
<body>

    <div id="game-result">
        <h1 id="res-title" style="font-family: 'Orbitron';" class="text-5xl mb-4">VICTORY</h1>
        <p id="res-sub" class="text-cyan-400 uppercase tracking-widest">Crewmates Won</p>
        <button onclick="location.reload()" class="mt-10 px-10 py-4 bg-white text-black font-bold rounded-lg">RESTART</button>
    </div>

    <div id="scr-login" class="screen active justify-center">
        <div class="text-center mb-10">
            <h1 class="text-5xl font-black italic">TACTICAL</h1>
            <h2 class="text-xl text-cyan-400 font-bold tracking-widest">AMONG US</h2>
        </div>
        <div class="glass p-6 space-y-4">
            <input id="inp-name" type="text" placeholder="NAME" class="w-full bg-black/50 p-4 rounded-lg border border-white/20 text-center font-bold">
            <button onclick="goMode()" class="w-full btn-prime py-4 text-lg">INITIALIZE</button>
        </div>
    </div>

    <div id="scr-mode" class="screen justify-center space-y-4">
        <button onclick="goHost()" class="glass p-8 text-center border-cyan-500/30">
            <i class="fas fa-satellite-dish text-3xl mb-2 text-cyan-400"></i>
            <div class="font-bold">HOST MISSION</div>
        </button>
        <div class="glass p-6 flex flex-col gap-3">
            <input id="inp-code" type="text" placeholder="6-DIGIT CODE" class="bg-black/50 p-3 rounded-lg text-center border border-white/10">
            <button onclick="joinGame()" class="w-full bg-green-600 py-3 rounded-lg font-bold">JOIN GAME</button>
        </div>
    </div>

    <div id="scr-setup" class="screen">
        <h2 class="text-xl font-bold text-cyan-400 mb-4">UPLOAD TASKS</h2>
        <div class="glass p-4 space-y-3">
            <input id="task-name" type="text" placeholder="LOCATION NAME" class="w-full bg-black p-3 rounded-lg border border-white/10">
            <input type="file" id="task-file" class="hidden" accept="image/*" onchange="previewTask(this)">
            <button onclick="document.getElementById('task-file').click()" class="w-full py-4 border-2 border-dashed border-white/20 rounded-lg text-gray-500 text-sm">
                <span id="hint-text">TAP TO TAKE PHOTO</span>
                <img id="prev-img" class="hidden w-full h-20 object-cover rounded mt-2">
            </button>
            <button onclick="saveTask()" class="w-full py-2 bg-cyan-900 border border-cyan-500 rounded font-bold">SAVE</button>
        </div>
        <div id="task-preview-list" class="flex gap-2 mt-4 overflow-x-auto"></div>
        <button onclick="setupLobby()" class="mt-auto btn-prime py-4">CREATE LOBBY</button>
    </div>

    <div id="scr-lobby" class="screen items-center justify-center">
        <div class="text-cyan-400 text-sm font-bold">ROOM CODE</div>
        <h1 id="view-code" class="text-6xl font-black mb-10 font-['Orbitron']">000000</h1>
        <div id="plist" class="w-full glass p-4 min-h-[200px] mb-6 space-y-2 text-sm"></div>
        <button id="btn-start" onclick="launch()" class="hidden w-full bg-green-600 py-4 rounded-lg font-black">START GAME</button>
    </div>

    <div id="scr-hud" class="screen">
        <div class="flex justify-between items-center mb-2">
            <div>
                <div id="tag-role" class="text-2xl font-black italic">AGENT</div>
                <div id="tag-gps" class="text-[10px] text-cyan-500 font-mono">GPS: SYNCING...</div>
            </div>
            <button onclick="emergency()" class="bg-orange-600 px-3 py-1 rounded text-[10px] font-bold">MEETING</button>
        </div>
        <div id="map-view"><div id="map-layer"></div></div>
        <div class="glass p-2 flex items-center gap-3 mb-3">
            <img id="hud-img" class="w-12 h-12 object-cover rounded opacity-50">
            <div>
                <div class="text-[10px] text-cyan-400 font-bold">OBJECTIVE</div>
                <div id="hud-task-name" class="font-bold">WAITING...</div>
            </div>
        </div>
        <video id="cam" class="hidden w-full h-32 bg-black rounded-lg border border-cyan-500 mb-2" autoplay playsinline></video>
        <div class="grid grid-cols-2 gap-3 pb-4">
            <button id="btn-task" onclick="doTask()" class="btn-prime py-6 font-bold" disabled>TASK</button>
            <button id="btn-report" onclick="emergency()" class="glass py-6 text-red-500 font-bold opacity-30">REPORT</button>
        </div>
    </div>

<script>
    // 1. SIMPLE NAVIGATION (Har Internet par chalega)
    function show(id) {
        document.querySelectorAll('.screen').forEach(s => s.classList.remove('active'));
        document.getElementById(id).classList.add('active');
    }

    function goMode() {
        let name = document.getElementById('inp-name').value;
        if(name.length < 2) return alert("Naam toh daalo!");
        state.name = name.toUpperCase();
        show('scr-mode');
    }

    function goHost() { show('scr-setup'); }

    // 2. FIREBASE & CORE LOGIC
    const firebaseConfig = {
        apiKey: "AIzaSyDbR67XE2iBcqQUkrDjjr7LQtLUNpyUdB8",
        databaseURL: "https://rl-amongus-real-life-amo-5542a-default-rtdb.firebaseio.com",
        projectId: "rl-amongus-real-life-amo-5542a",
        appId: "1:811874974870:web:db729403e3c241c1d76b7"
    };
    firebase.initializeApp(firebaseConfig);
    const db = firebase.database();

    let state = { id: 'p'+Math.floor(Math.random()*999), name:'', code:'', tasks:[], cur:0, role:'Crewmate', lat:0, lon:0, origin:{la:0, lo:0} };

    // --- TASK SYSTEM ---
    async function getHash(src) {
        return new Promise(res => {
            const img = new Image(); img.src = src; img.onload = () => {
                const c = document.createElement('canvas'); const ctx = c.getContext('2d');
                c.width = 10; c.height = 10; ctx.drawImage(img,0,0,10,10);
                const d = ctx.getImageData(0,0,10,10).data;
                let h = ""; for(let i=0; i<d.length; i+=4) h += ((d[i]+d[i+1]+d[i+2])/3 > 120 ? "1" : "0");
                res(h);
            };
        });
    }

    function previewTask(input) {
        const reader = new FileReader();
        reader.onload = async (e) => {
            document.getElementById('prev-img').src = e.target.result;
            document.getElementById('prev-img').classList.remove('hidden');
            document.getElementById('hint-text').classList.add('hidden');
            state.tempHash = await getHash(e.target.result);
        };
        reader.readAsDataURL(input.files[0]);
    }

    function saveTask() {
        const name = document.getElementById('task-name').value;
        const img = document.getElementById('prev-img').src;
        if(!name || !state.tempHash) return alert("Photo aur Name dono chahiye!");
        state.tasks.push({ name, img, hash: state.tempHash });
        document.getElementById('task-preview-list').innerHTML += `<img src="${img}" class="w-10 h-10 rounded border border-cyan-500">`;
        document.getElementById('task-name').value = '';
        document.getElementById('prev-img').classList.add('hidden');
        document.getElementById('hint-text').classList.remove('hidden');
    }

    // --- GAME SYNC ---
    async function setupLobby() {
        state.code = Math.floor(100000 + Math.random()*900000).toString();
        await db.ref('rooms/'+state.code).set({ status:'lobby', tasks: state.tasks });
        joinGame(state.code);
        document.getElementById('btn-start').classList.remove('hidden');
    }

    function joinGame(overrideCode) {
        state.code = overrideCode || document.getElementById('inp-code').value;
        if(!state.code) return;
        db.ref(`rooms/${state.code}/players/${state.id}`).set({ name: state.name, role:'Crewmate', status:'alive', lat:0, lon:0 });
        document.getElementById('view-code').innerText = state.code;
        show('scr-lobby');
        
        db.ref(`rooms/${state.code}/players`).on('value', snap => {
            const players = snap.val() || {};
            document.getElementById('plist').innerHTML = Object.values(players).map(p => `<div class="p-2 bg-white/5 border-l-2 border-cyan-500">${p.name}</div>`).join('');
            
            if(players[state.id]) {
                state.role = players[state.id].role;
                document.getElementById('tag-role').innerText = state.role;
                document.getElementById('tag-role').style.color = state.role === 'Impostor' ? '#ff003c' : '#00f3ff';
            }
            renderMap(players);
            checkWin(players);
        });

        db.ref(`rooms/${state.code}/status`).on('value', s => { 
            if(s.val()==='playing') { 
                show('scr-hud'); 
                startGPS(); 
                db.ref(`rooms/${state.code}/tasks`).once('value', t => { state.tasks = t.val(); updateHUD(); });
            } 
        });
    }

    function launch() { db.ref(`rooms/${state.code}`).update({ status: 'playing' }); assignRoles(); }

    function assignRoles() {
        db.ref(`rooms/${state.code}/players`).once('value', snap => {
            const ids = Object.keys(snap.val());
            const imp = ids[Math.floor(Math.random()*ids.length)];
            ids.forEach(id => db.ref(`rooms/${state.code}/players/${id}`).update({ role: id===imp?'Impostor':'Crewmate' }));
        });
    }

    function startGPS() {
        navigator.geolocation.watchPosition(p => {
            if(state.origin.la === 0) { state.origin.la = p.coords.latitude; state.origin.lo = p.coords.longitude; }
            state.lat = p.coords.latitude; state.lon = p.coords.longitude;
            const d = getDist(state.origin.la, state.origin.lo, state.lat, state.lon);
            document.getElementById('tag-gps').innerText = `MOVED: ${d.toFixed(1)}M`;
            document.getElementById('btn-task').disabled = (d < 5);
            db.ref(`rooms/${state.code}/players/${state.id}`).update({ lat: state.lat, lon: state.lon });
        }, null, {enableHighAccuracy:true});
    }

    function renderMap(players) {
        const layer = document.getElementById('map-layer'); layer.innerHTML = '';
        for(let id in players) {
            const p = players[id];
            if(p.status === 'dead') continue;
            const dot = document.createElement('div');
            dot.className = 'p-dot';
            dot.style.left = 50 + (p.lon - state.origin.lo) * 1000000 + '%';
            dot.style.top = 50 + (p.lat - state.origin.la) * 1000000 + '%';
            dot.style.background = (id === state.id) ? '#00f3ff' : (state.role==='Impostor'?'#ff003c':'#fff');
            layer.appendChild(dot);
        }
    }

    async function doTask() {
        const b = document.getElementById('btn-task'); const v = document.getElementById('cam');
        if(b.innerText === "TASK") {
            const s = await navigator.mediaDevices.getUserMedia({video:{facingMode:'environment'}});
            v.srcObject = s; v.classList.remove('hidden'); b.innerText = "CHECK";
        } else {
            const c = document.createElement('canvas'); c.width=100; c.height=100;
            c.getContext('2d').drawImage(v,0,0,100,100);
            const h = await getHash(c.toDataURL());
            let diff=0; for(let i=0; i<100; i++) if(h[i]!==state.tasks[state.cur].hash) diff++;
            if(diff < 45) {
                alert("TASK DONE!"); state.cur++; state.origin={la:state.lat, lo:state.lon};
                v.srcObject.getTracks().forEach(t=>t.stop()); v.classList.add('hidden');
                b.innerText = "TASK"; b.disabled = true; updateHUD();
            } else { alert("AI REJECTED! Align properly."); b.innerText = "TASK"; }
        }
    }

    function updateHUD() {
        const t = state.tasks[state.cur];
        if(t) { document.getElementById('hud-task-name').innerText = t.name; document.getElementById('hud-img').src = t.img; }
        else { document.getElementById('hud-task-name').innerText = "ALL CLEAR"; }
    }

    function emergency() {
        const target = prompt("Kisko eject karna hai? (Enter Name)");
        if(!target) return;
        db.ref(`rooms/${state.code}/players`).once('value', snap => {
            const players = snap.val();
            for(let id in players) {
                if(players[id].name.toUpperCase() === target.toUpperCase()) {
                    db.ref(`rooms/${state.code}/players/${id}`).update({ status: 'dead' });
                    alert(players[id].name + " was " + players[id].role);
                }
            }
        });
    }

    // --- NEW WIN LOGIC (Hardcore) ---
    function checkWin(players) {
        const pArr = Object.values(players);
        if(pArr.length < 2) return;
        const alive = pArr.filter(p => p.status === 'alive');
        const imps = alive.filter(p => p.role === 'Impostor').length;
        const crew = alive.filter(p => p.role === 'Crewmate').length;

        if(imps === 0) endGame("VICTORY", "Impostor Eliminated!");
        // Only win if EXACTLY 0 crewmates are left
        else if(crew === 0) endGame("DEFEAT", "Impostor Wins!");
    }

    function endGame(t, s) {
        document.getElementById('game-result').style.display = 'flex';
        document.getElementById('res-title').innerText = t;
        document.getElementById('res-sub').innerText = s;
    }

    function getDist(la1, lo1, la2, lo2) {
        const R = 6371000;
        const dLat = (la2-la1)*Math.PI/180;
        const dLon = (lo2-lo1)*Math.PI/180;
        const a = Math.sin(dLat/2)**2 + Math.cos(la1*Math.PI/180)*Math.cos(la2*Math.PI/180)*Math.sin(dLon/2)**2;
        return R * 2 * Math.atan2(Math.sqrt(a), Math.sqrt(1-a));
    }
</script>
</body>
                    </html>
